<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#0d1b2e"/>
<title>Daily Account Boats</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛵</text></svg>"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1b2e;--bg2:#112240;--bl:#1d4ed8;--cy:#0891b2;
  --go:#d97706;--gr:#059669;--re:#dc2626;
  --t1:#e2e8f0;--t2:#94a3b8;--t3:#475569;
  --bd:rgba(148,163,184,.15);--r:12px;--r2:8px;
}
html,body{background:var(--bg);color:var(--t1);direction:rtl;min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  font-size:16px;-webkit-font-smoothing:antialiased;
  overflow-x:hidden;max-width:100vw;}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bl);border-radius:2px}

/* LAYOUT */
.app{display:flex;min-height:100vh}
.side{width:270px;min-height:100vh;background:var(--bg2);border-left:1px solid var(--bd);
  display:flex;flex-direction:column;position:fixed;right:0;top:0;bottom:0;z-index:200;
  transition:transform .25s ease}
.side.hidden{transform:translateX(100%)}
.sov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199}
.sov.show{display:block}
.main{margin-right:270px;flex:1;display:flex;flex-direction:column;padding-bottom:44px}

/* SIDEBAR */
.slogo{padding:20px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.sic{width:40px;height:40px;background:linear-gradient(135deg,var(--cy),var(--bl));
  border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.slt{font-size:14px;font-weight:800;line-height:1.2}
.sls{font-size:10px;color:var(--t2)}
.snav{flex:1;padding:8px;overflow-y:auto}
.sng{margin-bottom:4px}
.sngt{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;
  letter-spacing:1px;padding:6px 10px 3px}
.sni{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--r2);
  cursor:pointer;font-size:14px;font-weight:500;color:var(--t2);
  transition:background .12s,color .12s;position:relative;margin-bottom:1px}
.sni:hover{background:rgba(29,78,216,.15);color:var(--t1)}
.sni.act{background:linear-gradient(135deg,rgba(29,78,216,.25),rgba(8,145,178,.15));color:var(--cy);font-weight:600}
.sni.act::before{content:'';position:absolute;right:0;top:20%;bottom:20%;
  width:3px;background:var(--cy);border-radius:2px 0 0 2px}
.sfoot{padding:12px;border-top:1px solid var(--bd)}
.sync-chip{margin-bottom:8px;padding:5px 8px;border-radius:6px;background:rgba(255,255,255,.04);
  border:1px solid var(--bd);font-size:10px;display:flex;align-items:center;gap:5px}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot.g{background:var(--gr)}.dot.r{background:var(--re)}.dot.s{background:var(--cy);animation:ps .7s alternate infinite}
@keyframes ps{from{opacity:.3}to{opacity:1}}
.suc{display:flex;align-items:center;gap:8px;padding:8px 10px;
  background:rgba(255,255,255,.04);border-radius:var(--r2);border:1px solid var(--bd)}
.sua{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--go),var(--re));
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}

/* TOPBAR */
.top{height:58px;padding:0 22px;display:flex;align-items:center;justify-content:space-between;
  background:rgba(13,27,46,.95);border-bottom:1px solid var(--bd);
  position:sticky;top:0;z-index:40}
.tpt{font-size:17px;font-weight:800;color:var(--cy)}
.top-right{display:flex;gap:8px;align-items:center;font-size:11px}
.hmb{display:none;background:none;border:none;cursor:pointer;color:var(--t1);font-size:24px;padding:4px}
.sclose-btn{display:none;background:none;border:none;cursor:pointer;color:var(--t2);font-size:18px}

/* CONTENT */
.cnt{padding:20px 22px}
.page{display:none}.page.act{display:block}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);
  overflow:hidden;margin-bottom:16px}
.ch{padding:14px 20px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between}
.ct{font-size:15px;font-weight:700}
.cb{padding:18px}

/* STATS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.sc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:18px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sc.c::before{background:var(--cy)}.sc.g::before{background:var(--go)}
.sc.e::before{background:var(--gr)}.sc.r::before{background:var(--re)}
.sv{font-size:24px;font-weight:800;margin:5px 0 3px}
.sl{font-size:12px;color:var(--t2)}

/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
thead th{background:rgba(29,78,216,.12);padding:11px 14px;text-align:right;
  font-size:12px;font-weight:700;color:var(--t2);border-bottom:1px solid var(--bd);white-space:nowrap}
tbody td{padding:10px 14px;border-bottom:1px solid rgba(148,163,184,.07);vertical-align:middle}
tbody tr:hover td{background:rgba(29,78,216,.05)}
tbody tr:last-child td{border-bottom:none}
.tda{display:flex;gap:5px}
.empty{text-align:center;padding:32px;color:var(--t3);font-size:13px}

/* FORMS */
.fgrid{display:flex;flex-direction:column;gap:14px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fr3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.fr4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.ff{display:flex;flex-direction:column;gap:5px}
.ff label{font-size:12px;font-weight:600;color:var(--t2)}
input,select,textarea{
  background:#ffffff;
  border:1px solid #cbd5e1;
  border-radius:var(--r2);padding:9px 12px;
  font-family:inherit;font-size:14px;
  color:#0f2a4a;width:100%;direction:rtl;
  -webkit-appearance:none;
  transition:border-color .15s,box-shadow .15s;
}
input:hover,select:hover,textarea:hover{
  border-color:#94a3b8;
}
input:focus,select:focus,textarea:focus{
  outline:none;
  border-color:#0891b2;
  box-shadow:0 0 0 3px rgba(8,145,178,.15);
}
input::placeholder{color:#94a3b8}
textarea{resize:vertical;min-height:68px}
select option{background:#ffffff;color:#0f2a4a}

/* FILTER */
.fb{display:flex;gap:10px;align-items:flex-end;padding:12px 20px;
  background:rgba(29,78,216,.06);border-bottom:1px solid var(--bd);flex-wrap:wrap}
.ffi{display:flex;flex-direction:column;gap:4px}
.ffi label{font-size:11px;font-weight:700;color:var(--t3)}
.ffi input,.ffi select{min-width:140px;font-size:13px;background:#fdf8f0;border-color:#d4c5a9;color:#0f2a4a}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:var(--r2);
  font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .12s}
.bp{background:var(--bl);color:#fff}.bp:hover{background:#1e40af}
.bg{background:rgba(255,255,255,.07);color:var(--t2);border:1px solid var(--bd)}.bg:hover{color:var(--t1);background:rgba(255,255,255,.12)}
.bd2{background:rgba(220,38,38,.12);color:var(--re);border:1px solid rgba(220,38,38,.25)}
.bs{background:rgba(5,150,105,.12);color:var(--gr);border:1px solid rgba(5,150,105,.25)}
.sm{padding:5px 10px;font-size:12px}

/* BADGES */
.bj{display:inline-flex;align-items:center;padding:3px 8px;border-radius:12px;font-size:12px;font-weight:600}
.bb{background:rgba(29,78,216,.18);color:#93c5fd}
.bc{background:rgba(8,145,178,.15);color:#67e8f9}
.bg2{background:rgba(217,119,6,.15);color:#fcd34d}
.be{background:rgba(5,150,105,.15);color:#6ee7b7}
.br{background:rgba(220,38,38,.15);color:#fca5a5}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:500;align-items:center;justify-content:center;padding:16px}
.modal-bg.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);
  width:100%;max-width:820px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.mh{padding:16px 22px;border-bottom:1px solid var(--bd);display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1}
.mht{font-size:15px;font-weight:800}
.mbody{padding:22px}
.mf{padding:14px 22px;border-top:1px solid var(--bd);display:flex;gap:8px}
.xb{background:none;border:none;color:var(--t3);font-size:20px;cursor:pointer}
.xb:hover{color:var(--re)}

/* LOGIN */
/* ── LOGIN SLIDESHOW ── */
.login-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;background:#051628;
}

/* Slideshow slides */
.ls-slide{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  opacity:0;transition:opacity 1.8s ease;
  animation:none;
}
.ls-slide.act{opacity:1;}

/* Dark overlay gradient on all slides */
.ls-slide::after{
  content:'';position:absolute;inset:0;
  background:
    linear-gradient(to left, rgba(0,0,0,.15) 0%, transparent 40%),
    linear-gradient(to top, rgba(0,10,30,.85) 0%, rgba(0,10,30,.3) 50%, rgba(0,10,30,.1) 100%);
}

/* Ken Burns zoom animation */
@keyframes kb{from{transform:scale(1)}to{transform:scale(1.08)}}
.ls-slide.act .ls-img{animation:kb 8s ease-out forwards;}
.ls-img{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  width:100%;height:100%;
}

/* Slide dots */
.ls-dots{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;z-index:5;
}
.ls-dot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,255,255,.4);cursor:pointer;
  transition:all .3s;border:none;padding:0;
}
.ls-dot.act{background:#fff;width:24px;border-radius:4px;}

/* Caption */
.ls-caption{
  position:absolute;bottom:50px;right:40px;z-index:5;
  color:rgba(255,255,255,.7);font-size:13px;font-weight:500;
  text-shadow:0 1px 4px rgba(0,0,0,.5);
}

/* Login card */
.lc{
  width:100%;max-width:420px;margin:16px;
  background:rgba(5,15,40,.82);
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;padding:40px;
  backdrop-filter:blur(24px);
  position:relative;z-index:10;
  box-shadow:0 32px 80px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.05);
}

/* Sharm logo watermark */
.ls-brand{
  position:absolute;top:24px;right:32px;z-index:10;
  display:flex;align-items:center;gap:10px;
}
.ls-brand-ic{
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.12);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;font-size:22px;
}
.ls-brand-txt{color:rgba(255,255,255,.9);font-size:15px;font-weight:800;
  text-shadow:0 2px 8px rgba(0,0,0,.5)}
.ls-brand-sub{color:rgba(255,255,255,.55);font-size:11px;margin-top:1px;}


/* SUB NAV */
.sni-sub{padding:7px 10px 7px 14px;font-size:13px;color:var(--t3);margin-right:8px;
  border-right:2px solid rgba(8,145,178,.2);}
.sni-sub:hover{color:var(--t1);background:rgba(29,78,216,.1);}
.sni-sub.act{color:var(--cy);background:rgba(8,145,178,.1);}

/* SYNC BAR */
.sybar{position:fixed;bottom:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 18px;font-size:11px;font-weight:600}
.sybar.on{background:rgba(13,27,46,.95);border-top:1px solid var(--bd)}
.sybar.off{background:rgba(127,29,29,.25);border-top:1px solid rgba(220,38,38,.3)}
.sybar.sy{background:rgba(7,89,133,.25);border-top:1px solid rgba(8,145,178,.3)}

/* OFFLINE BANNER */
.ob{background:rgba(127,29,29,.2);border:1px solid rgba(220,38,38,.25);
  border-radius:var(--r2);padding:9px 12px;font-size:12px;color:#fca5a5;
  display:flex;align-items:center;gap:7px;margin-bottom:12px}

/* SUB NAV ITEMS */
.sni-sub{
  padding-right:28px !important;
  font-size:13px !important;
  opacity:.85;
}
.sni-sub:hover{opacity:1}
.nav-sub{border-right:2px solid rgba(8,145,178,.25);margin-right:14px;}

/* MOBILE */
@media(max-width:900px){
  html,body{font-size:14px;overflow-x:hidden}
  .side{width:270px;transform:translateX(100%);max-width:85vw}
  .side.open{transform:translateX(0)}
  .main{margin-right:0 !important;width:100%;max-width:100vw;overflow-x:hidden}
  .app{overflow-x:hidden;max-width:100vw}
  .hmb{display:block}
  .sclose-btn{display:block}
  .tw{overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:100%}
  table{font-size:12px;min-width:500px}
  thead th{padding:7px 8px;font-size:10px;white-space:nowrap}
  tbody td{padding:7px 8px;white-space:nowrap}
  .sg{grid-template-columns:1fr 1fr;gap:8px}
  .top{height:52px;padding:0 10px}
  .tpt{font-size:13px}
  .cnt{padding:8px;overflow-x:hidden}
  .card{margin-bottom:10px}
  .ch{padding:9px 10px;flex-wrap:wrap;gap:6px}
  .cb{padding:10px}
  .ct{font-size:12px}
  .fr2{grid-template-columns:1fr 1fr;gap:8px}
  .fr3{grid-template-columns:1fr 1fr;gap:8px}
  .fr4{grid-template-columns:1fr 1fr;gap:8px}
  input,select,textarea{font-size:14px;padding:8px 10px}
  .fb{padding:8px 10px;gap:6px;flex-wrap:wrap}
  .ffi{min-width:0;flex:1}
  .ffi label{font-size:10px}
  .ffi input,.ffi select{min-width:0;width:100%;font-size:12px;background:#fdf8f0;color:#0f2a4a;border-color:#d4c5a9}
  .btn{font-size:12px;padding:6px 10px}
  .sm{padding:4px 7px;font-size:11px}
  #d-kpi{grid-template-columns:1fr 1fr !important;gap:8px}
  #d-charts-row{grid-template-columns:1fr !important}
  .modal{margin:6px;max-height:95vh}
  .mbody{padding:12px}
  .mh{padding:10px 12px}
  .mf{padding:8px 12px;gap:6px}
  .sfoot{padding:8px}
  .suc{padding:6px 8px;gap:6px}
  .sybar{padding:5px 10px;font-size:10px}
  .tda{gap:3px}
  .tda .btn{padding:4px 6px;font-size:11px}
}
@media(max-width:480px){
  html,body{font-size:13px}
  .top{padding:0 8px}
  .tpt{font-size:12px}
  .cnt{padding:6px}
  .sg{grid-template-columns:1fr 1fr;gap:6px}
  .sv{font-size:18px}
  table{font-size:11px;min-width:380px}
  thead th{padding:5px 6px;font-size:9px}
  tbody td{padding:5px 6px}
  .fr2{grid-template-columns:1fr}
  .fr3{grid-template-columns:1fr 1fr}
  .lc{padding:18px 14px;margin:8px}
  .btn{font-size:11px;padding:5px 8px}
  .ch{padding:8px}
  .cb{padding:8px}
}
/* Readonly inputs */
input[readonly]{
  background:#f1f5f9 !important;
  border-color:#e2e8f0 !important;
  color:#64748b !important;cursor:default;
}
/* Number inputs */
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
/* Date inputs */
input[type=date]::-webkit-calendar-picker-indicator{
  filter:invert(0.7);cursor:pointer;
}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="login-page" class="login-wrap">

  <!-- SLIDESHOW BACKGROUND -->
  <div id="ls-container">
    <!-- Slide 1: Sharm boats at sea — vivid blue water -->
    <div class="ls-slide act" id="slide-0">
      <div class="ls-img" style="background-image:url('https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=1600&q=85&auto=format');"></div>
    </div>
    <!-- Slide 2: Coral reef / underwater Sharm -->
    <div class="ls-slide" id="slide-1">
      <div class="ls-img" style="background-image:url('https://images.unsplash.com/photo-1559827260-dc66d52bef19?w=1600&q=85&auto=format');"></div>
    </div>
    <!-- Slide 3: Luxury cruise yacht -->
    <div class="ls-slide" id="slide-2">
      <div class="ls-img" style="background-image:url('https://images.unsplash.com/photo-1567899378494-47b22a2ae96a?w=1600&q=85&auto=format');"></div>
    </div>
    <!-- Slide 4: Red Sea sunrise golden hour -->
    <div class="ls-slide" id="slide-3">
      <div class="ls-img" style="background-image:url('https://images.unsplash.com/photo-1506953823976-52e1fdc0149a?w=1600&q=85&auto=format');"></div>
    </div>
    <!-- Slide 5: Snorkeling boat trip -->
    <div class="ls-slide" id="slide-4">
      <div class="ls-img" style="background-image:url('https://images.unsplash.com/photo-1540202404-a2f29016b523?w=1600&q=85&auto=format');"></div>
    </div>
  </div>

  <!-- Brand watermark top right -->
  <div class="ls-brand">
    <div class="ls-brand-ic">⛵</div>
    <div>
      <div class="ls-brand-txt">Daily Account Boats</div>
      <div class="ls-brand-sub">شرم الشيخ • البحر الأحمر</div>
    </div>
  </div>

  <!-- Slide dots -->
  <div class="ls-dots" id="ls-dots"></div>

  <!-- Slide caption -->
  <div class="ls-caption" id="ls-caption">شرم الشيخ • البحر الأحمر</div>

  <!-- LOGIN CARD -->
  <div class="lc">
    <div style="text-align:center;margin-bottom:28px">
      <!-- Animated logo -->
      <div style="width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,rgba(8,145,178,.3),rgba(29,78,216,.3));border:2px solid rgba(8,145,178,.4);display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 14px;box-shadow:0 0 30px rgba(8,145,178,.25)">⛵</div>
      <div style="font-size:22px;font-weight:900;color:#fff;letter-spacing:.3px">Daily Account Boats</div>
      <div style="font-size:12px;color:rgba(148,216,255,.65);margin-top:6px;display:flex;align-items:center;justify-content:center;gap:6px">
        <span style="width:30px;height:1px;background:rgba(148,216,255,.3);display:inline-block"></span>
        إدارة مالية متكاملة
        <span style="width:30px;height:1px;background:rgba(148,216,255,.3);display:inline-block"></span>
      </div>
    </div>
    <div class="fgrid">
      <div class="ff">
        <label style="color:rgba(255,255,255,.6)">👤 اسم المستخدم</label>
        <input id="l-user" placeholder="username" autocomplete="username"
          style="background:#ffffff;border-color:#cbd5e1;color:#0f2a4a"/>
      </div>
      <div class="ff">
        <label style="color:rgba(255,255,255,.6)">🔑 كلمة المرور</label>
        <input id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password"
          style="background:#ffffff;border-color:#cbd5e1;color:#0f2a4a"/>
      </div>
      <div id="l-err" style="display:none;color:#fca5a5;font-size:12px;background:rgba(127,29,29,.3);padding:8px 12px;border-radius:8px;border:1px solid rgba(220,38,38,.3)"></div>
      <button class="btn bp" style="justify-content:center;padding:13px;font-size:15px;font-weight:700;letter-spacing:.3px;border-radius:12px;background:linear-gradient(135deg,#0891b2,#1d4ed8);box-shadow:0 4px 20px rgba(8,145,178,.4)" onclick="doLogin()">
        🔓 تسجيل الدخول
      </button>
      <div style="text-align:center;font-size:11px;color:rgba(148,163,184,.35);margin-top:4px">
        🔒 نظام محمي بكلمة مرور
      </div>
    </div>
  </div>
</div>



<!-- MAIN APP -->
<div id="main-app" style="display:none">
<div class="app">
  <!-- Overlay -->
  <div class="sov" id="sov" onclick="closeSide()"></div>

  <!-- SIDEBAR -->
  <aside class="side" id="sidebar">
    <div class="slogo">

async function sbFetch(table,method="GET",body=null,filter=""){
  const r=await fetch(`${SB_URL}/rest/v1/${table}${filter}`,{
    method,
    headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,
      "Content-Type":"application/json","Prefer":method==="POST"?"return=representation":""},
    body:body?JSON.stringify(body):null
  });
  const t=await r.text();
  return t?JSON.parse(t):[];
}
const sbGet=(t)=>sbFetch(t,"GET",null,"?order=id.asc");
async function sbUpsert(t,row){
  try{
    const r=await fetch(SB_URL+"/rest/v1/"+t+"?on_conflict=id",{
      method:"POST",
      headers:{
        "apikey":SB_KEY,
        "Authorization":"Bearer "+SB_KEY,
        "Content-Type":"application/json",
        "Prefer":"return=representation,resolution=merge-duplicates"
      },
      body:JSON.stringify(row)
    });
    const txt=await r.text();
    if(!r.ok){console.error("Upsert error:",r.status,txt);return null;}
    return txt?JSON.parse(txt):null;
  }catch(e){console.error("sbUpsert failed:",e);return null;}
}

// ── Excel Export Helper ──
function exportExcel(data,cols,filename){
  if(!data||data.length===0){alert("لا توجد بيانات للتصدير");return;}
  var BOM="﻿";
  var NL="\n";
  var header=cols.map(function(c){return c.label;}).join(",");
  var rows=data.map(function(row){
    return cols.map(function(c){
      var v=String(row[c.key]||"");
      if(v.indexOf(",")>=0||v.indexOf(NL)>=0)v='"'+v.replace(/"/g,'""')+'"';
      return v;
    }).join(",");
  });
  var csv=BOM+header+NL+rows.join(NL);
  var blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download=filename+"_"+toDay()+".csv";
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}
const ld=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};
const gid=a=>Math.max(0,...a.map(x=>x.id))+1;

let isOnline=navigator.onLine;
let syncPending=0;
let syncMsg="";

function updateSyncUI(){
  const dot1=document.getElementById("sync-dot");
  const txt=document.getElementById("sync-txt");
  const pend=document.getElementById("sync-pending");
  const barDot=document.getElementById("bar-dot");
  const barTxt=document.getElementById("bar-txt");
  const barBtn=document.getElementById("bar-sync-btn");
  const barStatus=document.getElementById("bar-status");
  const barEl=document.getElementById("sybar");
  const chip=document.getElementById("sync-chip");

  const q=ld(K.Q,[]);
  syncPending=q.length;

  if(!isOnline){
    if(dot1){dot1.className="dot r";txt.textContent="غير متصل";txt.style.color="var(--t2)"}
    if(barEl){barEl.className="sybar off";barDot.className="dot r";barTxt.textContent="غير متصل — البيانات محفوظة محلياً";barStatus.textContent="🔴"}
    if(pend)pend.style.display="none";
    if(barBtn)barBtn.style.display="none";
  } else if(syncMsg==="syncing"){
    if(dot1){dot1.className="dot s";txt.textContent="جاري المزامنة..."}
    if(barEl){barEl.className="sybar sy";barDot.className="dot s";barTxt.textContent="🔄 جاري المزامنة مع السحابة...";barStatus.textContent="🔄"}
    if(pend)pend.style.display="none";
    if(barBtn)barBtn.style.display="none";
  } else {
    if(dot1){dot1.className="dot g";txt.textContent=syncPending>0?`${syncPending} معلق`:"متصل"}
    if(barEl){barEl.className="sybar on";barDot.className="dot g";
      barTxt.textContent=syncMsg||( syncPending>0?`${syncPending} عملية معلقة`:"✅ متزامن");
      barStatus.textContent="🟢"}
    if(pend){pend.textContent=syncPending>0?`${syncPending}⏳`:"";pend.style.display=syncPending>0?"":"none"}
    if(barBtn)barBtn.style.display=syncPending>0?"":"none";
  }
}

async function pull(){
  for(const[k,t] of Object.entries(TBL)){
    try{
      const rows=await sbGet(t);
      if(!Array.isArray(rows)){continue;}
      // For users table, never overwrite with empty
      if(k===K.U&&rows.length===0){continue;}
      // For data tables: if Supabase returns data, always use it (fresh from server)
      // If empty, only skip if we have local data (prevent accidental wipe)
      if(rows.length===0){
        var local=ld(k,[]);
        if(local.length>0){
          console.log("Pull: Supabase empty for",t,"keeping",local.length,"local rows");
          continue;
        }
      }
      sv(k,rows);
      console.log("Pull:",t,"→",rows.length,"rows");
    }catch(e){
      console.warn("Pull error",t,":",e.message);
    }
  }
}

let draining=false;
async function drain(){
  if(draining)return;
  draining=true;
  syncMsg="syncing";updateSyncUI();
  try{
    const q=ld(K.Q,[]);
    let pushed=0;
    // Step 1: Push all pending ops to Supabase
    for(const item of q){
      const t=TBL[item.t];if(!t)continue;
      if(item.op==="u"){
        const row=Object.assign({},item.p);
        if(row.desc!==undefined){row.description=row.desc;delete row.desc;}
        const res=await sbUpsert(t,[row]);
        // Confirm: update local with what Supabase returned
        if(Array.isArray(res)&&res.length>0){
          const local=ld(item.t,[]);
          const idx=local.findIndex(function(x){return x.id===res[0].id;});
          if(idx>=0)local[idx]=res[0];else local.push(res[0]);
          sv(item.t,local);
          console.log("Upsert confirmed:",t,res[0].id);
        }
        pushed++;
      } else {
        await sbDel(t,item.p.id);
        pushed++;
      }
    }
    // Step 2: Only pull if there were pending ops (to get server-confirmed data)
    // For background sync (no pending ops), pull to get other devices' changes
    if(pushed>0){
      // Small delay to let Supabase process
      await new Promise(function(r){setTimeout(r,300);});
    }
    await pull();
    // Step 3: Clear queue and update timestamp
    sv(K.Q,[]);
    sv(K.LS,new Date().toISOString());
    syncMsg="✅ تمت المزامنة";
    updateSyncUI();
    // Step 4: Refresh page ONLY if modal is closed
    var modalOpen=document.getElementById("modal")?.classList.contains("show");
    if(currentUser&&currentPage&&!modalOpen){
      renderPage(currentPage);
    }
    setTimeout(function(){syncMsg="";updateSyncUI();},3000);
  }catch(e){
    console.error("Sync error:",e);
    // On error: keep local data, don't clear queue
    syncMsg="⚠️ فشلت المزامنة — البيانات محفوظة محلياً";
    updateSyncUI();
    setTimeout(function(){syncMsg="";updateSyncUI();},5000);
  }finally{
    draining=false;
  }
}

function enq(t,op,p){
  // 1. Always save to local queue first (offline-safe)
  const q=ld(K.Q,[]);
  const i=q.findIndex(function(x){return x.t===t&&x.p&&x.p.id===p.id&&op==="u";});
  if(i>=0)q[i]={t,op,p,ts:Date.now()};
  else q.push({t,op,p,ts:Date.now()});
  sv(K.Q,q);
  updateSyncUI();
  // 2. Try to sync if online (non-blocking)
  if(isOnline){
    setTimeout(function(){drain();},100); // small delay so UI updates first
  }
}

function manualSync(){if(isOnline)drain();}

window.addEventListener("online",()=>{isOnline=true;updateSyncUI();drain();});
window.addEventListener("offline",()=>{isOnline=false;updateSyncUI();});

function canAccess(id){
  const role=currentUser?.role||"viewer";
  if(role==="admin")return true;
  const allItems=NAV_DEF.flatMap(g=>g.items);
  // Check top-level items
  const item=allItems.find(x=>x.id===id);
  if(item)return !item.roles||item.roles.includes(role);
  // Check sub-items
  const allSubs=allItems.flatMap(x=>x.sub||[]);
  const sub=allSubs.find(x=>x.id===id);
  if(sub)return !sub.roles||sub.roles.includes(role);
  return true;
}
function isReadOnly(){return currentUser?.role==="viewer";}

function buildNav(){
  const role=currentUser?.role||"viewer";
  const nav=document.getElementById("nav-links");
  nav.innerHTML="";

  NAV_DEF.forEach(group=>{
    const items=group.items.filter(it=>!it.roles||it.roles.includes(role));
    if(!items.length)return;

    const g=document.createElement("div");g.className="sng";
    g.innerHTML=`<div class="sngt">${group.g}</div>`;

    items.forEach(it=>{
      // Check if this item has sub-items visible to this role
      const subs=(it.sub||[]).filter(s=>!s.roles||s.roles.includes(role));
      const isParentActive=currentPage===it.id||subs.some(s=>s.id===currentPage);
      const isOpen=isParentActive; // auto-open if child is active

      // Parent item
      const d=document.createElement("div");
      d.className="sni"+(currentPage===it.id?" act":"");
      if(subs.length){
        // Has children — show expand arrow
        d.innerHTML=`<span style="font-size:15px;flex-shrink:0">${it.ic}</span>
          <span style="flex:1">${it.l}</span>
          <span class="nav-arrow" style="font-size:11px;color:var(--t3);transition:transform .2s;transform:${isOpen?"rotate(90deg)":"rotate(0deg)"}"">▶</span>`;
        d.onclick=()=>{
          // Toggle sub-menu
          const sub=d.nextElementSibling;
          if(sub&&sub.classList.contains("nav-sub")){
            const open=sub.style.display!=="none";
            sub.style.display=open?"none":"block";
            const arrow=d.querySelector(".nav-arrow");
            if(arrow)arrow.style.transform=open?"rotate(0deg)":"rotate(90deg)";
          }
          navigate(it.id);
        };
      } else {
        d.innerHTML=`<span style="font-size:15px;flex-shrink:0">${it.ic}</span>${it.l}`;
        d.onclick=()=>navigate(it.id);
      }
      g.appendChild(d);

      // Sub-items container
      if(subs.length){
        const subDiv=document.createElement("div");
        subDiv.className="nav-sub";
        subDiv.style.display=isOpen?"block":"none";
        subs.forEach(s=>{
          const sd=document.createElement("div");
          sd.className="sni sni-sub"+(currentPage===s.id?" act":"");
          sd.innerHTML=`<span style="font-size:11px;color:var(--t3);margin-right:4px">└</span>
            <span style="font-size:13px;flex-shrink:0">${s.ic}</span>${s.l}`;
          sd.onclick=()=>navigate(s.id);
          subDiv.appendChild(sd);
        });
        g.appendChild(subDiv);
      }
    });
    nav.appendChild(g);
  });
}

function navigate(id){
  if(!canAccess(id))return;
  currentPage=id;
  document.getElementById("page-title").textContent=TITLES[id]||id;
  buildNav(); // rebuild nav first so sub-items appear/hide
  renderPage(id);
  closeSide();
}

function offlBanner(){return!isOnline?`<div class="ob">📴 غير متصل — البيانات محفوظة محلياً</div>`:""}

function renderPage(id){
  const el=document.getElementById("app-content");
  switch(id){
    case"dash":         el.innerHTML=offlBanner()+renderDash();        attachDash();        break;
    case"users":        el.innerHTML=offlBanner()+renderUsers();       attachUsers();       break;
    case"clients":      el.innerHTML=offlBanner()+renderClients();     attachClients();     break;
    case"lists":        el.innerHTML=offlBanner()+renderLists();       attachLists();       break;
    case"se":           el.innerHTML=offlBanner()+renderSE();          attachSE();          break;
    case"sv":           el.innerHTML=offlBanner()+renderSV();          attachSV();          break;
    case"ee":           el.innerHTML=offlBanner()+renderEE();          attachEE();          break;
    case"ev":           el.innerHTML=offlBanner()+renderEV();          attachEV();          break;
    case"payroll":      el.innerHTML=offlBanner()+renderPayroll();     attachPayroll();     break;
    case"payroll-view": el.innerHTML=offlBanner()+renderPayrollView(); attachPayrollView(); break;
    case"payroll-rep":  el.innerHTML=offlBanner()+renderPayrollRep();  attachPayrollRep();  break;
    case"rep":          el.innerHTML=offlBanner()+renderRep();         attachRep();         break;
  }
}

// ─── DASHBOARD ───
function renderDash(){
  const today=toDay(), m=today.slice(0,7);
  return(
    '<div class="card" style="margin-bottom:16px">'+
      '<div class="fb" style="flex-wrap:wrap">'+
        '<div class="ffi"><label>📅 من</label><input type="date" id="df-from" value="'+m+'-01"/></div>'+
        '<div class="ffi"><label>📅 إلى</label><input type="date" id="df-to" value="'+today+'"/></div>'+
        '<div class="ffi"><label>⛵ المركب</label>'+
          '<select id="df-boat"><option value="">كل المراكب</option>'+
          BOATS.map(function(b){return'<option>'+b+'</option>';}).join('')+
          '</select>'+
        '</div>'+
        '<div style="display:flex;gap:6px;align-items:flex-end">'+
          '<button class="btn bp sm" onclick="updateDash()">🔍 تطبيق</button>'+
          '<button class="btn bg sm" onclick="resetDash()">↺</button>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div id="d-kpi" style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px"></div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">'+
      '<div id="d-boats-chart"></div>'+
      '<div id="d-exp-chart"></div>'+
    '</div>'+
    '<div id="d-boats-table" style="margin-bottom:16px"></div>'+
    '<div id="d-recent"></div>'
  );
}

function attachDash(){
  setTimeout(function(){
    var els=["df-from","df-to","df-boat"];
    els.forEach(function(id){
      var el=document.getElementById(id);
      if(el)el.addEventListener("change",updateDash);
    });
    updateDash();
  },30);
}

function resetDash(){
  var today=toDay(),m=today.slice(0,7);
  var f=document.getElementById("df-from");
  var t=document.getElementById("df-to");
  var b=document.getElementById("df-boat");
  if(f)f.value=m+"-01";
  if(t)t.value=today;
  if(b)b.value="";
  updateDash();
}

function updateDash(){
  var kpiEl=document.getElementById("d-kpi");
  if(!kpiEl)return;

  var fd=document.getElementById("df-from")?.value||"";
  var ft=document.getElementById("df-to")?.value||"";
  var fb=document.getElementById("df-boat")?.value||"";

  var sales=ld(K.S,[]);
  var exps=ld(K.E,[]);
  var pay=ld(K.P,[]);

  var fs=sales.filter(function(s){return(!fd||s.date>=fd)&&(!ft||s.date<=ft)&&(!fb||s.boat===fb);});
  var fe=exps.filter(function(e){return(!fd||e.date>=fd)&&(!ft||e.date<=ft)&&(!fb||e.boat===fb);});
  var fp=pay.filter(function(p){return(!fd||p.date>=fd)&&(!ft||p.date<=ft)&&(!fb||p.boat===fb);});

  var rev=fs.reduce(function(a,s){return a+(+s.total||0);},0);
  var exp=fe.reduce(function(a,e){return a+(+e.total||0);},0);
  var payT=fp.reduce(function(a,p){return a+(+p.amount||0);},0);
  var net=rev-exp-payT;
  var kit=fe.filter(function(e){return e.exp_type==="المطابخ";}).reduce(function(a,e){return a+(+e.total||0);},0);
  var opX=fe.filter(function(e){return e.exp_type==="مصاريف التشغيل";}).reduce(function(a,e){return a+(+e.total||0);},0);
  var adm=fe.filter(function(e){return e.exp_type==="المصاريف الإدارية";}).reduce(function(a,e){return a+(+e.total||0);},0);

  // KPI cards
  var kpis=[
    {ic:"💰",l:"إجمالي الإيرادات",v:rev,c:"var(--cy)",sub:fs.length+" رحلة"},
    {ic:"📊",l:"إجمالي المصاريف",v:exp+payT,c:"var(--re)",sub:"مطابخ: "+fmt(kit)},
    {ic:"📈",l:"صافي الربح",v:net,c:net>=0?"var(--gr)":"var(--re)",sub:net>=0?"✅ ربح":"⚠️ خسارة"},
    {ic:"👥",l:"إجمالي المرتبات",v:payT,c:"var(--go)",sub:fp.length+" سجل"},
  ];
  kpiEl.innerHTML=kpis.map(function(x){
    return'<div style="background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:20px;position:relative;overflow:hidden">'+
      '<div style="position:absolute;top:0;left:0;right:0;height:3px;background:'+x.c+'"></div>'+
      '<div style="font-size:24px;margin-bottom:8px">'+x.ic+'</div>'+
      '<div style="font-size:11px;color:var(--t2);margin-bottom:4px">'+x.l+'</div>'+
      '<div style="font-size:22px;font-weight:800;color:'+x.c+'">'+fmt(x.v)+'</div>'+
      '<div style="font-size:11px;color:var(--t3);margin-top:4px">'+x.sub+'</div>'+
    '</div>';
  }).join("");

  // Boats bar chart
  var boatEl=document.getElementById("d-boats-chart");
  if(boatEl){
    var bdata=BOATS.map(function(b){
      return{l:b,v:fs.filter(function(s){return s.boat===b;}).reduce(function(a,s){return a+(+s.total||0);},0)};
    }).filter(function(x){return x.v>0;}).sort(function(a,b2){return b2.v-a.v;});
    var bmax=Math.max.apply(null,bdata.map(function(x){return x.v;})||[1]);
    boatEl.innerHTML='<div class="card"><div class="ch"><span class="ct">⛵ إيرادات المراكب</span></div><div class="cb">'+
      (bdata.length===0?'<div class="empty">لا بيانات</div>':
        bdata.map(function(x){
          var pct=bmax>0?Math.round(x.v/bmax*100):0;
          return'<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'+
            '<div style="width:70px;font-size:12px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+x.l+'</div>'+
            '<div style="flex:1;height:20px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden">'+
              '<div style="height:100%;width:'+pct+'%;background:var(--cy);border-radius:4px;transition:width .5s"></div>'+
            '</div>'+
            '<div style="width:85px;font-size:12px;font-weight:700;color:var(--cy);text-align:left">'+fmt(x.v)+'</div>'+
          '</div>';
        }).join(""))+'</div></div>';
  }

  // Expense breakdown
  var expEl=document.getElementById("d-exp-chart");
  if(expEl){
    var colors=["var(--go)","#60a5fa","var(--re)","var(--cy)"];
    var edata=[
      {l:"المطابخ",v:kit},{l:"التشغيل",v:opX},{l:"الإدارية",v:adm},{l:"المرتبات",v:payT}
    ].filter(function(x){return x.v>0;}).sort(function(a,b2){return b2.v-a.v;});
    var etot=edata.reduce(function(a,x){return a+x.v;},0);
    expEl.innerHTML='<div class="card"><div class="ch"><span class="ct">📊 توزيع المصاريف</span></div><div class="cb">'+
      (edata.length===0?'<div class="empty">لا بيانات</div>':
        edata.map(function(x,i){
          var pct=etot>0?Math.round(x.v/etot*100):0;
          return'<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'+
            '<div style="width:10px;height:10px;border-radius:50%;background:'+colors[i%4]+';flex-shrink:0"></div>'+
            '<div style="flex:1;font-size:12px;color:var(--t1)">'+x.l+'</div>'+
            '<div style="width:100px;height:7px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden">'+
              '<div style="height:100%;width:'+pct+'%;background:'+colors[i%4]+';border-radius:4px"></div>'+
            '</div>'+
            '<div style="width:28px;font-size:10px;color:var(--t3)">'+pct+'%</div>'+
            '<div style="width:75px;font-size:12px;font-weight:700;color:'+colors[i%4]+';text-align:left">'+fmt(x.v)+'</div>'+
          '</div>';
        }).join(""))+'</div></div>';
  }

  // Boats summary table
  var tblEl=document.getElementById("d-boats-table");
  if(tblEl){
    var rows=BOATS.map(function(b){
      var br=fs.filter(function(s){return s.boat===b;}).reduce(function(a,s){return a+(+s.total||0);},0);
      var be=fe.filter(function(e){return e.boat===b;}).reduce(function(a,e){return a+(+e.total||0);},0);
      var bp=fp.filter(function(p){return p.boat===b;}).reduce(function(a,p){return a+(+p.amount||0);},0);
      var bn=br-be-bp;
      var trips=fs.filter(function(s){return s.boat===b;}).length;
      return{b:b,br:br,be:be,bp:bp,bn:bn,trips:trips};
    }).filter(function(r){return r.br>0||r.be>0;});
    tblEl.innerHTML='<div class="card"><div class="ch"><span class="ct">⛵ ملخص المراكب</span></div>'+
      '<div class="tw"><table><thead><tr><th>المركب</th><th>الرحلات</th><th>الإيرادات</th><th>المصاريف</th><th>المرتبات</th><th>الصافي</th></tr></thead>'+
      '<tbody>'+(rows.length===0?'<tr><td colspan="6"><div class="empty">لا بيانات</div></td></tr>':
        rows.map(function(r){
          return'<tr>'+
            '<td>'+bj("bc",r.b)+'</td>'+
            '<td style="text-align:center">'+r.trips+'</td>'+
            '<td style="color:var(--gr);font-weight:700">'+fmt(r.br)+'</td>'+
            '<td style="color:var(--re)">'+fmt(r.be)+'</td>'+
            '<td style="color:var(--go)">'+fmt(r.bp)+'</td>'+
            '<td style="color:'+(r.bn>=0?"var(--gr)":"var(--re)")+';font-weight:800">'+fmt(r.bn)+'</td>'+
          '</tr>';
        }).join(""))+'</tbody></table></div></div>';
  }

  // Recent sales
  var recEl=document.getElementById("d-recent");
  if(recEl){
    var recent=fs.slice().sort(function(a,b2){return b2.date.localeCompare(a.date);}).slice(0,5);
    recEl.innerHTML='<div class="card"><div class="ch"><span class="ct">🕐 آخر المبيعات</span></div>'+
      '<div class="tw"><table><thead><tr><th>التاريخ</th><th>المركب</th><th>السنتر</th><th>الطلعة</th><th>المطبخ</th><th>الإجمالي</th></tr></thead>'+
      '<tbody>'+(recent.length===0?'<tr><td colspan="6"><div class="empty">لا بيانات بعد</div></td></tr>':
        recent.map(function(s){
          return'<tr>'+
            '<td>'+s.date+'</td>'+
            '<td>'+bj("bc",s.boat||"")+'</td>'+
            '<td>'+(s.center||"-")+'</td>'+
            '<td style="color:var(--cy)">'+fmt(s.trip)+'</td>'+
            '<td style="color:var(--go)">'+fmt(s.kitchen)+'</td>'+
            '<td style="color:var(--gr);font-weight:700">'+fmt(s.total)+'</td>'+
          '</tr>';
        }).join(""))+'</tbody></table></div></div>';
  }
}

// ─── USERS ───
function renderUsers(){
  var users=ld(K.U,INIT_USERS);
  var isAdmin=currentUser&&currentUser.role==="admin";
  var ro=isReadOnly();
  var roleBadges={admin:bj("bg2","مدير"),user:bj("bc","مستخدم"),hr:bj("be","HR"),viewer:bj("br","مشاهد")};
  var rows=users.map(function(u){
    var editBtn=(!ro&&(isAdmin||u.id===currentUser.id))?'<button class="btn bg sm" onclick="userForm('+u.id+')">✏️</button>':"";
    var delBtn=(!ro&&isAdmin&&u.id!==currentUser.id)?'<button class="btn bd2 sm" onclick="delUser('+u.id+')">🗑</button>':"";
    return'<tr><td>'+u.id+'</td><td style="font-weight:600">'+u.name+'</td><td>'+bj("bb",u.username)+'</td><td>'+(roleBadges[u.role]||bj("bc",u.role||""))+'</td><td><div class="tda">'+editBtn+delBtn+'</div></td></tr>';
  }).join("");
  return'<div class="card"><div class="ch"><span class="ct">👥 المستخدمون</span>'+(isAdmin?'<button class="btn bp sm" onclick="userForm()">+ إضافة</button>':"")+
    '</div><div class="tw"><table><thead><tr><th>#</th><th>الاسم</th><th>المستخدم</th><th>الدور</th><th></th></tr></thead><tbody>'+
    (rows||'<tr><td colspan="5"><div class="empty">لا يوجد مستخدمون</div></td></tr>')+'</tbody></table></div></div>';
}
function attachUsers(){}
function userForm(id){
  const users=ld(K.U,INIT_USERS);
  const u=id?users.find(x=>x.id===id):{id:null,username:"",password:"",name:"",role:"user"};
  openModal(id?"تعديل المستخدم":"إضافة مستخدم",`
    <div class="fr2">
      <div class="ff"><label>الاسم الكامل</label><input id="u-name" value="${u.name||""}"/></div>
      <div class="ff"><label>اسم المستخدم</label><input id="u-user" value="${u.username||""}"/></div>
      <div class="ff"><label>كلمة المرور</label><input id="u-pass" type="password" value="${u.password||""}"/></div>
      <div class="ff"><label>الدور</label>
        <select id="u-role">
          <option value="admin" ${u.role==="admin"?"selected":""}>مدير</option>
          <option value="user" ${u.role==="user"?"selected":""}>مستخدم</option>
          <option value="hr" ${u.role==="hr"?"selected":""}>موارد بشرية</option>
          <option value="viewer" ${u.role==="viewer"?"selected":""}>مشاهد فقط</option>
        </select>
      </div>
    </div>`,"حفظ",()=>{
    const name=document.getElementById("u-name").value.trim();
    const user=document.getElementById("u-user").value.trim();
    const pass=document.getElementById("u-pass").value;
    const role=document.getElementById("u-role").value;
    if(!name||!user||!pass)return alert("يرجى ملء الحقول");
    const users=ld(K.U,INIT_USERS);
    const rec={id:id||gid(users),username:user,password:pass,name,role};
    const newUsers=id?users.map(x=>x.id===id?rec:x):[...users,rec];
    sv(K.U,newUsers);enq(K.U,"u",rec);closeModal();renderPage("users");
  });
}
function delUser(id){
  if(!confirm("حذف المستخدم؟"))return;
  const users=ld(K.U,INIT_USERS);
  const rec=users.find(x=>x.id===id);
  sv(K.U,users.filter(x=>x.id!==id));enq(K.U,"d",rec);renderPage("users");
}

// ─── CLIENTS ───
function renderClients(){
  var cls=ld(K.C,[]);
  var isAdmin=currentUser&&currentUser.role==="admin";
  var rows=cls.map(function(c){
    var editBtn=(isAdmin||c.by_user===currentUser.id)?'<button class="btn bg sm" onclick="clientForm('+c.id+')">✏️</button>':"";
    var delBtn=isAdmin?'<button class="btn bd2 sm" onclick="delClient('+c.id+')">🗑</button>':"";
    return'<tr><td>'+c.id+'</td><td style="font-weight:600">'+c.name+'</td><td>'+(c.phone||"")+'</td><td>'+(c.address||"")+'</td><td style="color:var(--go);font-weight:700">'+fmt(c.price)+'</td><td><div class="tda">'+editBtn+delBtn+'</div></td></tr>';
  }).join("");
  return'<div class="card"><div class="ch"><span class="ct">👤 العملاء</span>'+
    '<button class="btn bp sm" onclick="clientForm()">+ إضافة</button></div>'+
    '<div class="tw"><table><thead><tr><th>#</th><th>الاسم</th><th>التليفون</th><th>العنوان</th><th>السعر</th><th></th></tr></thead><tbody>'+
    (rows||'<tr><td colspan="6"><div class="empty">لا يوجد عملاء</div></td></tr>')+'</tbody></table></div></div>';
}
function attachClients(){}
function clientForm(id){
  const cls=ld(K.C,[]);
  const c=id?cls.find(x=>x.id===id):{id:null,name:"",phone:"",address:"",price:""};
  openModal(id?"تعديل العميل":"إضافة عميل",`
    <div class="fr2">
      <div class="ff"><label>الاسم</label><input id="c-name" value="${c.name||""}"/></div>
      <div class="ff"><label>التليفون</label><input id="c-phone" value="${c.phone||""}"/></div>
      <div class="ff"><label>العنوان</label><input id="c-addr" value="${c.address||""}"/></div>
      <div class="ff"><label>السعر</label><input id="c-price" type="number" value="${c.price||""}"/></div>
    </div>`,"حفظ",()=>{
    const name=document.getElementById("c-name").value.trim();
    if(!name)return alert("أدخل الاسم");
    const cls=ld(K.C,[]);
    const rec={id:id||gid(cls),name,phone:document.getElementById("c-phone").value,
      address:document.getElementById("c-addr").value,
      price:+document.getElementById("c-price").value||0,
      by_user:currentUser?.id};
    const newCls=id?cls.map(x=>x.id===id?rec:x):[...cls,rec];
    sv(K.C,newCls);enq(K.C,"u",rec);closeModal();renderPage("clients");
  });
}
function delClient(id){
  if(!confirm("حذف العميل؟"))return;
  const cls=ld(K.C,[]);const rec=cls.find(x=>x.id===id);
  sv(K.C,cls.filter(x=>x.id!==id));enq(K.C,"d",rec);renderPage("clients");
}

// ─── LISTS ───
let listsTab="b";
function renderLists(){
  var role=currentUser&&currentUser.role||"user";
  var isHR=role==="hr";
  if(isHR)return renderHRList();
  var tabs='<div style="display:flex;gap:8px;margin-bottom:14px">'+
    '<button class="btn '+(listsTab==="b"?"bp":"bg")+'" onclick="switchListTab(\"b\")">⛵ المراكب</button>'+
    '<button class="btn '+(listsTab==="e"?"bp":"bg")+'" onclick="switchListTab(\"e\")">📋 المصاريف</button>'+
  '</div>';
  return tabs+(listsTab==="b"?renderBoatsList():renderExpLists());
}
function renderHRList(){
  var cat="مرتبات العاملين";
  var items=EXP_CATS[cat]||[];
  var chips=items.map(function(it,i){
    return'<div style="display:flex;align-items:center;gap:4px;background:rgba(5,150,105,.1);border:1px solid rgba(5,150,105,.25);border-radius:7px;padding:6px 12px;font-size:13px;font-weight:600">👤 '+it+
      '<button style="background:none;border:none;cursor:pointer;color:var(--re);font-size:12px" onclick="rmItem(this)">✕</button></div>';
  }).join("");
  return'<div class="card"><div class="ch"><span class="ct">👥 مرتبات العاملين</span></div><div class="cb">'+
    '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">'+chips+'</div>'+
    '<div style="display:flex;gap:8px"><input id="ni-hr-emp" placeholder="إضافة موظف جديد..." style="flex:1"/>'+
    '<button class="btn bp sm" onclick="addHREmp()">+ إضافة</button></div>'+
  '</div></div>';
}
function renderBoatsList(){
  var chips=BOATS.map(function(b,i){
    return'<div style="display:flex;align-items:center;gap:4px;background:rgba(8,145,178,.12);border:1px solid var(--bd);border-radius:7px;padding:5px 10px;font-size:13px">⛵ '+b+
      '<button style="background:none;border:none;cursor:pointer;color:var(--re);font-size:12px" onclick="rmBoat(this)">✕</button></div>';
  }).join("");
  return'<div class="card"><div class="ch"><span class="ct">⛵ المراكب</span></div><div class="cb">'+
    '<div style="display:flex;gap:8px;margin-bottom:12px"><input id="new-boat" placeholder="اسم مركب جديد" style="flex:1"/>'+
    '<button class="btn bp sm" onclick="addBoat()">+</button></div>'+
    '<div style="display:flex;flex-wrap:wrap;gap:6px">'+chips+'</div>'+
  '</div></div>';
}
function renderExpLists(){
  var newCatRow='<div style="display:flex;gap:8px;margin-bottom:14px">'+
    '<input id="new-cat" placeholder="فئة جديدة" style="flex:1"/>'+
    '<button class="btn bp sm" onclick="addCat()">+ فئة</button></div>';
  var cats=Object.entries(EXP_CATS).map(function(entry){
    var cat=entry[0]; var items=entry[1];
    var chips=items.map(function(it,i){
      return'<div style="display:flex;align-items:center;gap:3px;background:rgba(255,255,255,.06);border:1px solid var(--bd);border-radius:6px;padding:3px 8px;font-size:12px">'+it+
        '<button style="background:none;border:none;cursor:pointer;color:var(--re);font-size:11px" onclick="rmItem(this)">✕</button></div>';
    }).join("");
    var safeId="ni_"+cat.replace(/\s/g,"_");
    return'<div style="margin-bottom:12px;background:rgba(29,78,216,.06);border-radius:9px;border:1px solid var(--bd);overflow:hidden">'+
      '<div style="padding:8px 14px;background:rgba(29,78,216,.12);display:flex;justify-content:space-between;align-items:center">'+
        '<span style="font-weight:700;font-size:13px">'+cat+'</span>'+
        '<button class="btn bd2 sm" onclick=\"rmCat(this)\">حذف</button>'+

function impSales(inp){
  var f=inp.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{
      var rows=ev.target.result.split("\n").slice(1).filter(Boolean).map(function(row,i){
        var c=row.split(",");
        var isPendingS=currentUser.role!=="admin";
        return{id:gid(ld(K.S,[]).concat(ld(K.SP,[]))),date:c[0]&&c[0].trim()||toDay(),rtype:c[1]&&c[1].trim()||"",
          center:c[2]&&c[2].trim()||"",boat:c[3]&&c[3].trim()||"",count:c[4]&&c[4].trim()||"",
          trip:+c[5]||0,kitchen:+c[6]||0,total:(+c[5]||0)+(+c[6]||0),
          notes:c[7]&&c[7].trim()||"",by_user:currentUser.id,_pending:isPendingS};
      });
      var storeKey=currentUser.role==="admin"?K.S:K.SP;
      var existing=ld(storeKey,[]);
      sv(storeKey,existing.concat(rows));
      if(storeKey===K.S)rows.forEach(function(r2){enq(K.S,"u",r2);});
      alert("تم استيراد "+rows.length+" سجل");renderPage("se");
    }catch(e){alert("خطأ في القراءة: "+e.message);}
  };
  r.readAsText(f);inp.value="";
}

      '<div style="background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:20px;position:relative;overflow:hidden">'+
      '<div style="position:absolute;top:0;left:0;right:0;height:3px;background:var(--go)"></div>'+
      '<div style="font-size:12px;color:var(--t2);margin-bottom:6px">💰 إجمالي المرتبات</div>'+
      '<div style="font-size:26px;font-weight:800;color:var(--go)">'+fmt(total)+'</div>'+
      '<div style="font-size:11px;color:var(--t3);margin-top:4px">ج.م • '+data.length+' سجل</div></div>'+
      empCards+'</div>'+boatTable;
  }

  // Detail table
  var tblEl=document.getElementById("pr-table");
  if(tblEl){
    var tblRows=data.length===0?
      '<tr><td colspan="7"><div class="empty">لا توجد بيانات بهذه الفلاتر</div></td></tr>':
      data.map(function(p){
        return '<tr><td>'+p.id+'</td>'+
          '<td style="white-space:nowrap">'+p.date+'</td>'+
          '<td>'+bj("bc",p.boat||"")+'</td>'+
          '<td style="font-weight:700;color:var(--cy)">'+(p.employee||"")+'</td>'+
          '<td>'+(p.description||"")+'</td>'+
          '<td style="color:var(--go);font-weight:700">'+fmt(p.amount)+' ج.م</td>'+
          '<td style="color:var(--t2)">'+(p.notes||"")+'</td></tr>';
      }).join("");
    tblEl.innerHTML=
      '<div class="card">'+
      '<div class="ch"><span class="ct">📋 تفاصيل المرتبات</span>'+
      bj("bg2",data.length+" سجل")+
      '</div>'+
      '<div class="tw"><table>'+
      '<thead><tr><th>#</th><th>التاريخ</th><th>المركب</th><th>الموظف</th>'+
      '<th>البيان</th><th>المبلغ</th><th>ملاحظات</th></tr></thead>'+
      '<tbody>'+tblRows+'</tbody></table></div>'+
      (data.length>0?
        '<div style="padding:10px 16px;border-top:1px solid var(--bd);font-size:13px;display:flex;justify-content:space-between">'+
        '<span>إجمالي: <strong style="color:var(--go)">'+fmt(total)+' ج.م</strong> • '+data.length+' سجل</span>'+
        '<button class="btn bs sm" onclick="exportPayrollExcel()">📥 تصدير Excel</button>'+
        '</div>':"")+'</div>';
  }
}>
