/* ── SUPABASE CONFIG ── */
const SB_URL = "https://qgqemasgnyfdsjmezjsh.supabase.co";
const SB_KEY = "sb_publishable_Be_aAqJj_itUosit5wLiOA_M_4GSTck";

// Map local keys to Supabase table names
const TABLE = {
  "erp_u":"users","erp_c":"clients","erp_s":"sales","erp_e":"expenses"
};

// Supabase REST API helpers
const sbFetch = async(table, method="GET", body=null, filters="")=>{
  const url = `${SB_URL}/rest/v1/${table}${filters}`;
  const headers = {
    "apikey": SB_KEY,
    "Authorization": `Bearer ${SB_KEY}`,
    "Content-Type": "application/json",
    "Prefer": method==="POST"?"return=representation":"",
  };
  const res = await fetch(url, {method, headers, body: body?JSON.stringify(body):null});
  if(!res.ok) throw new Error(await res.text());
  const txt = await res.text();
  return txt ? JSON.parse(txt) : [];
};

const sbGetAll  = (table)          => sbFetch(table,"GET",null,"?order=id.asc");
const sbUpsert  = (table, row)     => sbFetch(table,"POST", row, "?on_conflict=id");
const sbDelete  = (table, id)      => sbFetch(table,"DELETE",null,`?id=eq.${id}`);

/* ── LOCAL STORAGE (offline cache) ── */
const K={U:"erp_u",C:"erp_c",S:"erp_s",E:"erp_e",X:"erp_x",Q:"erp_q",LS:"erp_ls"};
const ld=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};
const gid=a=>Math.max(0,...a.map(x=>x.id))+1;
const td=()=>new Date().toISOString().slice(0,10);
const fmt=n=>(n||0).toLocaleString("ar-EG",{maximumFractionDigits:2});

/* ── SYNC HOOK — localStorage + Supabase ── */
function useSync(){
  const[online,setOnline]=useState(()=>navigator.onLine);
  const[syncing,setSyncing]=useState(false);
  const[pending,setPending]=useState(()=>ld(K.Q,[]).length);
  const[lastSync,setLastSync]=useState(()=>ld(K.LS,null));
  const[msg,setMsg]=useState("");
  const refresh=()=>setPending(ld(K.Q,[]).length);

  // Pull latest data from Supabase → update local cache
  const pull=useCallback(async()=>{
    for(const [lk,tbl] of Object.entries(TABLE)){
      try{
        const rows = await sbGetAll(tbl);
        // For users table — keep local if supabase empty (first run)
        if(lk===K.U && rows.length===0) continue;
        sv(lk, rows);
      }catch{}
    }
  },[]);

  // Push pending queue to Supabase
  const drain=useCallback(async()=>{
    const q=ld(K.Q,[]);
    setSyncing(true);
    setMsg(q.length>0?"🔄 جاري المزامنة...":"🔄 جاري التحديث...");
    try{
      // Push pending ops
      for(const item of q){
        const tbl=TABLE[item.t];
        if(!tbl) continue;
        if(item.op==="u"){
          // Map desc field name
          const row={...item.p};
          if(row.desc!==undefined){row.description=row.desc;delete row.desc;}
          await sbUpsert(tbl,[row]);
        } else {
          await sbDelete(tbl, item.p.id);
        }
      }
      // Pull fresh data from Supabase
      await pull();
      sv(K.Q,[]);sv(K.LS,new Date().toISOString());
      setLastSync(new Date().toISOString());
      setPending(0);
      setMsg("✅ تمت المزامنة مع السحابة");
    }catch(e){
      setMsg("⚠️ فشلت المزامنة — البيانات محفوظة محلياً");
    }
    finally{setSyncing(false);setTimeout(()=>setMsg(""),4000);}
  },[pull]);

  useEffect(()=>{
    const on=()=>{setOnline(true);drain();};
    const off=()=>{setOnline(false);setMsg("📴 غير متصل — البيانات محفوظة محلياً");};
    window.addEventListener("online",on);
    window.addEventListener("offline",off);
    if(navigator.onLine) drain();
    return()=>{window.removeEventListener("online",on);window.removeEventListener("offline",off);};
  },[drain]);

  const enq=useCallback((t,op,p)=>{
    const q=ld(K.Q,[]);
    const i=q.findIndex(x=>x.t===t&&x.p?.id===p?.id&&op==="u");
    i>=0?q[i]={t,op,p}:q.push({t,op,p});
    sv(K.Q,q);refresh();
    if(navigator.onLine) drain();
  },[drain]);

  return{online,syncing,pending,lastSync,msg,enq,drain};
}

function SBar({online,syncing,pending,lastSync,msg,onSync}){
  const cls=syncing?"sy sn":online?"sy on":"sy off";
  const dc=syncing?"dot ds":online?"dot dg":"dot dr";
  const tx=msg||(syncing?"جاري المزامنة...":online?

function ExpEntry({cu,enq}){
  // Map description→desc for Supabase compatibility
  const mapExp=rows=>rows.map(r=>({...r,desc:r.desc||r.description||""}));
  const[data,setData]=useState(()=>mapExp(ld(K.E,[])));
  const[xr,setXr]=useState(()=>ld(K.X,{usd:50,eur:55}));
  const[m,setM]=useState(null);
  const[f,setF]=useState({date:td(),expType:"المطابخ",name:"",desc:"",egp:"",usd:"",eur:""});
  const isA=cu.role==="admin";
  const sv2=(d,r,op="u")=>{setData(mapExp(d));sv(K.E,d);if(r)enq(K.E,op,r);};
  const tot=(x)=>{const s=x||f;return(+s.egp||0)+(+s.usd||0)*xr.usd+(+s.eur||0)*xr.eur;};
  const go=()=>{
    const rec={...f,total:tot(),id:m==="add"?gid(data):m.id,by:cu.id};
    m==="add"?sv2([...data,rec],rec):sv2(data.map(e=>e.id===m.id?rec:e),rec);
    setM(null);
  };
  const imp=ev=>{
    const file=ev.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=e=>{
      try{
        const rows=e.target.result.split("\n").slice(1).filter(Boolean).map((row,i)=>{
          const c=row.split(",");
          const rec={id:gid([...data,{id:i}]),date:c[0]?.trim()||td(),expType:c[1]?.trim()||"",name:c[2]?.trim()||"",desc:c[3]?.trim()||"",egp:c[4]?.trim()||"0",usd:"0",eur:"0",by:cu.id};
          rec.total=+rec.egp||0;return rec;
        });
        const nd=[...data,...rows];setData(nd);sv(K.E,nd);rows.forEach(r2=>enq(K.E,"u",r2));
        alert(`تم استيراد ${rows.length} سجل`);
      }catch{alert("خطأ");}
    };
    r.readAsText(file);ev.target.value="";
  };
  return(
    <div>
      <div className="card">
        <div className="ch"><span className="ct">💱 سعر الصرف اليومي</span></div>
        <div className="cb">
          <div className="fr2">

            <div className="ff"><label>يورو (€) → ج.م</label><input type="number" value={xr.eur} onChange={e=>{const v={...xr,eur:+e.target.value};setXr(v);sv(K.X,v);}}/></div>
          </div>
        </div>
      </div>
      <div className="card">
        <div className="ch">
          <span className="ct">🧾 تسجيل مصاريف الخزنة</span>
          <div style={{display:"flex",gap:5}}>
            <label className="btn bg sm" style={{cursor:"pointer"}}>📤 Excel<input type="file" accept=".csv" style={{display:"none"}} onChange={imp}/></label>
            <button className="btn bp sm" onClick={()=>{setF({date:td(),expType:"المطابخ",name:"",desc:"",egp:"",usd:"",eur:""});setM("add");}}>+ إضافة</button>
          </div>
        </div>
        <div className="tw"><table>
          <thead><tr><th>#</th><th>التاريخ</th><th>نوع المصاريف</th><th>الاسم</th><th>البيان</th><th>مصري</th><th>دولار</th><th>يورو</th><th>الإجمالي</th><th></th></tr></thead>
          <tbody>
            {data.length===0&&<tr><td colSpan={10}><div className="empty">لا توجد مصاريف</div></td></tr>}
            {data.map(e=>(
              <tr key={e.id}>
                <td>{e.id}</td><td>{e.date}</td><td><Bj t="bg2" ch={e.expType}/></td>
                <td style={{fontWeight:600}}>{e.name}</td>
                <td style={{maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.desc}</td>
                <td>{fmt(e.egp)}</td>
                <td>{+e.usd>0?`$${(+e.usd).toFixed(0)}`:"-"}</td>
                <td>{+e.eur>0?`€${(+e.eur).toFixed(0)}`:"-"}</td>
                <td style={{color:"var(--re)",fontWeight:700}}>{fmt(e.total)}</td>
                <td><div className="tda">
                  {(isA||e.by===cu.id)&&<button className="btn bg sm" onClick={()=>{setF({...e});setM(e);}}>✏️</button>}
                  {isA&&<button className="btn bd sm" onClick={()=>{if(!confirm("حذف؟"))return;sv2(data.filter(x=>x.id!==e.id),e,"d");}}>🗑</button>}
                </div></td>
              </tr>
            ))}
          </tbody>
        </table></div>
      </div>
      {m&&<Mod title={m==="add"?"إضافة مصروف":"تعديل المصروف"} onClose={()=>setM(null)}

        ch={<div className="fg">

            <div className="ff"><label>نوع المصاريف</label><select value={f.expType} onChange={e=>setF(p=>({...p,expType:e.target.value,name:""}))}>

            <div className="ff"><label>دولار ($)</label><input type="number" value={f.usd} onChange={e=>setF(p=>({...p,usd:e.target.value}))}/></div>
            <div className="ff"><label>يورو (€)</label><input type="number" value={f.eur} onChange={e=>setF(p=>({...p,eur:e.target.value}))}/></div>

// NAV_ALL includes admin-only pages marked with adminOnly:true
const NAV_ALL=[
  {g:"الرئيسية",items:[{id:"dash",ic:"📊",l:"لوحة التحكم"}]},
  {g:"الإدارة",items:[
    {id:"users",ic:"👥",l:"المستخدمون",adminOnly:true},
    {id:"clients",ic:"👤",l:"العملاء"},
    {id:"lists",ic:"📋",l:"القوائم"},
  ]},
  {g:"الإيرادات",items:[{id:"se",ic:"💼",l:"تسجيل المبيعات"},{id:"sv",ic:"📈",l:"بيان المبيعات"}]},
  {g:"المصاريف",items:[{id:"ee",ic:"🧾",l:"تسجيل المصاريف"},{id:"ev",ic:"📉",l:"بيان المصاريف"}]},
  {g:"التقارير",items:[{id:"rep",ic:"📊",l:"التقارير"}]},
];
const TITLES={dash:"لوحة التحكم",users:"المستخدمون",clients:"العملاء",lists:"القوائم",se:"تسجيل المبيعات",sv:"بيان المبيعات",ee:"تسجيل المصاريف",ev:"بيان المصاريف",rep:"التقارير"};

function App(){
  const[cu,setCu]=useState(null);
  const[page,setPage]=useState("dash");
  const[sideOpen,setSideOpen]=useState(false);
  const{online,syncing,pending,lastSync,msg,enq,drain}=useSync();
  const closeSide=()=>setSideOpen(false);
  const isAdmin=cu?.role==="admin";

  // Filter NAV based on user role
  const NAV=NAV_ALL.map(g=>({
    ...g,
    items:g.items.filter(it=>!it.adminOnly||isAdmin)
  })).filter(g=>g.items.length>0);

  const navTo=(id)=>{
    // Security: block non-admin from accessing admin pages
    const allItems=NAV_ALL.flatMap(g=>g.items);
    const item=allItems.find(x=>x.id===id);
    if(item?.adminOnly&&!isAdmin) return;
    setPage(id);setSideOpen(false);
  };

  useEffect(()=>{if(!localStorage.getItem(K.U))sv(K.U,INIT_USERS);},[]);

  // Auto-logout after 8 hours of inactivity
  useEffect(()=>{
    if(!cu) return;
    let timer=setTimeout(()=>{
      setCu(null);
      alert("⏰ انتهت جلستك تلقائياً بعد 8 ساعات — يرجى تسجيل الدخول مجدداً");
    }, 8*60*60*1000);
    const reset=()=>{clearTimeout(timer);timer=setTimeout(()=>{
      setCu(null);
      alert("⏰ انتهت جلستك تلقائياً — يرجى تسجيل الدخول مجدداً");
    }, 8*60*60*1000);};
    window.addEventListener("click",reset);
    window.addEventListener("keydown",reset);
    return()=>{clearTimeout(timer);window.removeEventListener("click",reset);window.removeEventListener("keydown",reset);};
  },[cu]);

  // Warn admin if still using default password
  useEffect(()=>{
    if(cu?.username==="admin"&&cu?.password==="admin123"){
      setTimeout(()=>alert("⚠️ تنبيه أمني: أنت تستخدم كلمة السر الافتراضية!\nيرجى تغييرها من صفحة المستخدمين فوراً."),1500);
    }
  },[cu]);

  if(!cu) return (<><style>{CSS}</style><Login onLogin={setCu}/></>);

  const render=()=>{
    // Security guard — redirect non-admin trying to access admin pages
    if(page==="users"&&!isAdmin) return (<Dashboard/>);
    switch(page){
      case"dash":    return (<Dashboard/>);
      case"users":   return (<Users cu={cu} enq={enq}/>);
      case"clients": return (<Clients cu={cu} enq={enq}/>);
      case"lists":   return (<Lists cu={cu}/>);
      case"se":      return (<SalesEntry cu={cu} enq={enq}/>);
      case"sv":      return (<SalesView/>);
      case"ee":      return (<ExpEntry cu={cu} enq={enq}/>);
      case"ev":      return (<ExpView/>);
      case"rep":     return (<Reports/>);
      default:       return (<Dashboard/>);
    }
  };

  return(
    <>
      <style>{CSS}</style>
      <div className="app">

        {/* Overlay — closes sidebar when tapping outside */}
        <div className={`sov ${sideOpen?"show":""}`} onClick={closeSide}/>

        <aside className={`side ${sideOpen?"open":""}`}>
          <div className="slogo">
            <div className="sic">⛵</div>
            <div style={{flex:1}}><div className="slt">Daily Account Boats</div><div className="sls">إدارة مالية يومية</div></div>
            {/* X button inside sidebar for mobile */}
            <button className="sclose" onClick={closeSide} title="إغلاق">✕</button>
          </div>
          <nav className="snav">
            {NAV.map(g=>(
              <div key={g.g} className="sng">
                <div className="sngt">{g.g}</div>
                {g.items.map(it=>(
                  <div key={it.id} className={`sni ${page===it.id?"act":""}`} onClick={()=>navTo(it.id)}>
                    <span style={{fontSize:13,flexShrink:0}}>{it.ic}</span>{it.l}
                  </div>
                ))}
              </div>
            ))}
          </nav>
          <div className="sfoot">
            <div style={{marginBottom:7,padding:"4px 7px",borderRadius:5,background:"rgba(255,255,255,.04)",border:"1px solid var(--bd)",fontSize:9,display:"flex",alignItems:"center",gap:4}}>
              <span style={{width:5,height:5,borderRadius:"50%",background:online?"var(--gr)":"var(--re)",flexShrink:0}}/>
              <span style={{color:"var(--t2)",flex:1}}>{online?(syncing?"مزامنة...":"متصل"):"غير متصل"}</span>
              {pending>0&&<span style={{color:"var(--go)",fontWeight:700,fontSize:9}}>{pending}⏳</span>}
            </div>
            <div className="suc">
              <div className="sua">{(cu.name||"U")[0]}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:11,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cu.name}</div>
                <div style={{fontSize:9,color:"var(--t3)"}}>{cu.role==="admin"?"مدير":"مستخدم"}</div>
              </div>
              <button style={{background:"none",border:"none",cursor:"pointer",color:"var(--re)",fontSize:14,lineHeight:1}} onClick={()=>setCu(null)} title="خروج">⏻</button>
            </div>
          </div>
        </aside>

        <main className="main">
          <div className="top">
            {/* Hamburger button — mobile only */}
            <button className="hmb" onClick={()=>setSideOpen(p=>!p)} title="القائمة">☰</button>
            <div className="tpt">⛵ <span>{TITLES[page]}</span></div>
            <div style={{display:"flex",gap:5,alignItems:"center"}}>
              {!online&&<div style={{fontSize:9,color:"#fca5a5",background:"rgba(127,29,29,.2)",border:"1px solid rgba(220,38,38,.25)",borderRadius:4,padding:"2px 6px"}}>📴 غير متصل{pending>0&&` (${pending})`}</div>}
              {online&&pending>0&&!syncing&&<div style={{fontSize:9,color:"#fcd34d",background:"rgba(120,53,15,.2)",border:"1px solid rgba(217,119,6,.25)",borderRadius:4,padding:"2px 6px",cursor:"pointer"}} onClick={drain}>⏳ {pending} معلق</div>}
              {syncing&&<div style={{fontSize:9,color:"#67e8f9",background:"rgba(7,89,133,.2)",borderRadius:4,padding:"2px 6px"}}>🔄 مزامنة...</div>}
            </div>
          </div>

          <div className="cnt">
            {!online&&<div className="ob">📴 <span>غير متصل — البيانات محفوظة محلياً{pending>0&&` (${pending} عملية معلقة)`}</span></div>}
            {render()}
          </div>
        </main>

        <SBar online={online} syncing={syncing} pending={pending} lastSync={lastSync} msg={msg} onSync={drain}/>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
