<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#0d1b2e"/>
<title>Daily Account Boats</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛵</text></svg>"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1b2e;--bg2:#112240;--bl:#1d4ed8;--cy:#0891b2;
  --go:#d97706;--gr:#059669;--re:#dc2626;
  --t1:#e2e8f0;--t2:#94a3b8;--t3:#475569;
  --bd:rgba(148,163,184,.15);--r:12px;--r2:8px;
}
html,body{background:var(--bg);color:var(--t1);direction:rtl;min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  font-size:16px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bl);border-radius:2px}

/* LAYOUT */
.app{display:flex;min-height:100vh}
.side{width:270px;min-height:100vh;background:var(--bg2);border-left:1px solid var(--bd);
  display:flex;flex-direction:column;position:fixed;right:0;top:0;bottom:0;z-index:200;
  transition:transform .25s ease}
.side.hidden{transform:translateX(100%)}
.sov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199}
.sov.show{display:block}
.main{margin-right:270px;flex:1;display:flex;flex-direction:column;padding-bottom:44px}

/* SIDEBAR */
.slogo{padding:20px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.sic{width:40px;height:40px;background:linear-gradient(135deg,var(--cy),var(--bl));
  border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.slt{font-size:14px;font-weight:800;line-height:1.2}
.sls{font-size:10px;color:var(--t2)}
.snav{flex:1;padding:8px;overflow-y:auto}
.sng{margin-bottom:4px}
.sngt{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;
  letter-spacing:1px;padding:6px 10px 3px}
.sni{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--r2);
  cursor:pointer;font-size:14px;font-weight:500;color:var(--t2);
  transition:background .12s,color .12s;position:relative;margin-bottom:1px}
.sni:hover{background:rgba(29,78,216,.15);color:var(--t1)}
.sni.act{background:linear-gradient(135deg,rgba(29,78,216,.25),rgba(8,145,178,.15));color:var(--cy);font-weight:600}
.sni.act::before{content:'';position:absolute;right:0;top:20%;bottom:20%;
  width:3px;background:var(--cy);border-radius:2px 0 0 2px}
.sfoot{padding:12px;border-top:1px solid var(--bd)}
.sync-chip{margin-bottom:8px;padding:5px 8px;border-radius:6px;background:rgba(255,255,255,.04);
  border:1px solid var(--bd);font-size:10px;display:flex;align-items:center;gap:5px}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot.g{background:var(--gr)}.dot.r{background:var(--re)}.dot.s{background:var(--cy);animation:ps .7s alternate infinite}
@keyframes ps{from{opacity:.3}to{opacity:1}}
.suc{display:flex;align-items:center;gap:8px;padding:8px 10px;
  background:rgba(255,255,255,.04);border-radius:var(--r2);border:1px solid var(--bd)}
.sua{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--go),var(--re));
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}

/* TOPBAR */
.top{height:58px;padding:0 22px;display:flex;align-items:center;justify-content:space-between;
  background:rgba(13,27,46,.95);border-bottom:1px solid var(--bd);
  position:sticky;top:0;z-index:40}
.tpt{font-size:17px;font-weight:800;color:var(--cy)}
.top-right{display:flex;gap:8px;align-items:center;font-size:11px}
.hmb{display:none;background:none;border:none;cursor:pointer;color:var(--t1);font-size:24px;padding:4px}
.sclose-btn{display:none;background:none;border:none;cursor:pointer;color:var(--t2);font-size:18px}

/* CONTENT */
.cnt{padding:20px 22px}
.page{display:none}.page.act{display:block}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);
  overflow:hidden;margin-bottom:16px}
.ch{padding:14px 20px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between}
.ct{font-size:15px;font-weight:700}
.cb{padding:18px}

/* STATS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.sc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:18px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sc.c::before{background:var(--cy)}.sc.g::before{background:var(--go)}
.sc.e::before{background:var(--gr)}.sc.r::before{background:var(--re)}
.sv{font-size:24px;font-weight:800;margin:5px 0 3px}
.sl{font-size:12px;color:var(--t2)}

/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
thead th{background:rgba(29,78,216,.12);padding:11px 14px;text-align:right;
  font-size:12px;font-weight:700;color:var(--t2);border-bottom:1px solid var(--bd);white-space:nowrap}
tbody td{padding:10px 14px;border-bottom:1px solid rgba(148,163,184,.07);vertical-align:middle}
tbody tr:hover td{background:rgba(29,78,216,.05)}
tbody tr:last-child td{border-bottom:none}
.tda{display:flex;gap:5px}
.empty{text-align:center;padding:32px;color:var(--t3);font-size:13px}

/* FORMS */
.fgrid{display:flex;flex-direction:column;gap:14px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fr3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.fr4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.ff{display:flex;flex-direction:column;gap:5px}
.ff label{font-size:12px;font-weight:600;color:var(--t2)}
input,select,textarea{background:rgba(17,34,64,.8);border:1px solid var(--bd);
  border-radius:var(--r2);padding:9px 12px;font-family:inherit;font-size:14px;
  color:var(--t1);width:100%;direction:rtl;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--cy)}
textarea{resize:vertical;min-height:68px}
select option{background:var(--bg2)}

/* FILTER */
.fb{display:flex;gap:10px;align-items:flex-end;padding:12px 20px;
  background:rgba(29,78,216,.06);border-bottom:1px solid var(--bd);flex-wrap:wrap}
.ffi{display:flex;flex-direction:column;gap:4px}
.ffi label{font-size:11px;font-weight:700;color:var(--t3)}
.ffi input,.ffi select{min-width:140px;font-size:13px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:var(--r2);
  font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .12s}
.bp{background:var(--bl);color:#fff}.bp:hover{background:#1e40af}
.bg{background:rgba(255,255,255,.07);color:var(--t2);border:1px solid var(--bd)}.bg:hover{color:var(--t1);background:rgba(255,255,255,.12)}
.bd2{background:rgba(220,38,38,.12);color:var(--re);border:1px solid rgba(220,38,38,.25)}
.bs{background:rgba(5,150,105,.12);color:var(--gr);border:1px solid rgba(5,150,105,.25)}
.sm{padding:5px 10px;font-size:12px}

/* BADGES */
.bj{display:inline-flex;align-items:center;padding:3px 8px;border-radius:12px;font-size:12px;font-weight:600}
.bb{background:rgba(29,78,216,.18);color:#93c5fd}
.bc{background:rgba(8,145,178,.15);color:#67e8f9}
.bg2{background:rgba(217,119,6,.15);color:#fcd34d}
.be{background:rgba(5,150,105,.15);color:#6ee7b7}
.br{background:rgba(220,38,38,.15);color:#fca5a5}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:500;align-items:center;justify-content:center;padding:16px}
.modal-bg.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);
  width:100%;max-width:820px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.mh{padding:16px 22px;border-bottom:1px solid var(--bd);display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1}
.mht{font-size:15px;font-weight:800}
.mbody{padding:22px}
.mf{padding:14px 22px;border-top:1px solid var(--bd);display:flex;gap:8px}
.xb{background:none;border:none;color:var(--t3);font-size:20px;cursor:pointer}
.xb:hover{color:var(--re)}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0a1628,#0c2a4a 40%,#0a3d62 70%,#051e3e);
  position:relative;overflow:hidden}
.login-wrap::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 120% 60% at 50% 110%,rgba(0,150,255,.2) 0%,transparent 60%);
  animation:waves 6s ease-in-out infinite alternate}
@keyframes waves{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.lc{width:100%;max-width:450px;margin:16px;background:rgba(5,20,50,.8);
  border:1px solid rgba(0,180,255,.2);border-radius:20px;padding:40px;
  backdrop-filter:blur(20px);position:relative;z-index:1;
  box-shadow:0 28px 60px rgba(0,0,0,.5)}

/* SYNC BAR */
.sybar{position:fixed;bottom:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 18px;font-size:11px;font-weight:600}
.sybar.on{background:rgba(13,27,46,.95);border-top:1px solid var(--bd)}
.sybar.off{background:rgba(127,29,29,.25);border-top:1px solid rgba(220,38,38,.3)}
.sybar.sy{background:rgba(7,89,133,.25);border-top:1px solid rgba(8,145,178,.3)}

/* OFFLINE BANNER */
.ob{background:rgba(127,29,29,.2);border:1px solid rgba(220,38,38,.25);
  border-radius:var(--r2);padding:9px 12px;font-size:12px;color:#fca5a5;
  display:flex;align-items:center;gap:7px;margin-bottom:12px}

/* MOBILE */
@media(max-width:900px){
  .side{width:250px;transform:translateX(100%)}
  .side.open{transform:translateX(0)}
  .main{margin-right:0}
  .hmb{display:block}
  .sclose-btn{display:block}
  .sg{grid-template-columns:1fr 1fr;gap:10px}
  .top{height:52px;padding:0 14px}
  .tpt{font-size:15px}
  .cnt{padding:10px}
  table{font-size:12px}
  thead th{padding:8px 10px;font-size:10px}
  tbody td{padding:8px 10px}
  .fr3{grid-template-columns:1fr 1fr}
  .fr4{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){
  .sg{grid-template-columns:1fr 1fr}
  .fr2{grid-template-columns:1fr}
  .lc{padding:24px 18px;margin:12px}
  .cnt{padding:8px}
}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="login-page" class="login-wrap">
  <div class="lc">
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:52px;margin-bottom:10px">⛵</div>
      <div style="font-size:20px;font-weight:900;color:#e2e8f0">Daily Account Boats</div>
      <div style="font-size:12px;color:rgba(148,216,255,.7);margin-top:5px">إدارة مالية متكاملة • شرم الشيخ</div>
    </div>
    <div class="fgrid">
      <div class="ff"><label>اسم المستخدم</label>
        <input id="l-user" placeholder="username" autocomplete="username"/>
      </div>
      <div class="ff"><label>كلمة المرور</label>
        <input id="l-pass" type="password" placeholder="••••••" autocomplete="current-password"/>
      </div>

</div>

<!-- MAIN APP -->
<div id="main-app" style="display:none">
<div class="app">
  <!-- Overlay -->
  <div class="sov" id="sov" onclick="closeSide()"></div>

  <!-- SIDEBAR -->
  <aside class="side" id="sidebar">
    <div class="slogo">
      <div class="sic">⛵</div>
      <div style="flex:1">
        <div class="slt">Daily Account Boats</div>
        <div class="sls">إدارة مالية يومية</div>
      </div>

    </div>
    <nav class="snav" id="nav-links"></nav>

        <span class="dot g" id="sync-dot"></span>
        <span id="sync-txt" style="flex:1;color:var(--t2)">متصل</span>
        <span id="sync-pending" style="display:none;color:var(--go);font-weight:700"></span>
      </div>
      <div class="suc">
        <div class="sua" id="user-avatar">أ</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="user-name">المستخدم</div>
          <div style="font-size:10px;color:var(--t3)" id="user-role">-</div>
        </div>
        <button style="background:none;border:none;cursor:pointer;color:var(--re);font-size:16px" onclick="doLogout()" title="خروج">⏻</button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

      <button class="hmb" onclick="toggleSide()">☰</button>

      <div class="top-right" id="top-right"></div>

  </main>
</div>

<!-- SYNC BAR -->
<div class="sybar on" id="sybar">
  <div style="display:flex;align-items:center;gap:6px">
    <span class="dot g" id="bar-dot"></span>
    <span style="color:var(--t2)" id="bar-txt">متصل</span>
  </div>
  <div style="display:flex;gap:6px;align-items:center">
    <button class="btn bg sm" id="bar-sync-btn" style="display:none;font-size:10px" onclick="manualSync()">🔄 مزامنة</button>
    <span style="font-size:10px;color:var(--t3)" id="bar-status">🟢</span>
  </div>
</div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="mh">
      <span class="mht" id="modal-title">-</span>
      <button class="xb" onclick="closeModal()">✕</button>
    </div>
    <div class="mbody" id="modal-body"></div>
    <div class="mf" id="modal-footer"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════
const BOATS=["روما","آدم","سيريانا","ميس شيرى"];
const EXP_CATS={
  "المطابخ":["سوبرماركت","أنبوبة","مياه","م أخرى"],
  "مصاريف التشغيل":["سولار","زيت","أخرى"],
  "المصاريف الإدارية":["مرتبات","مصاريف نثرية","خدمات","ضرائب عامة","علاج"],
  "التصفية والأرباح":["مالك أول","مالك تاني","مالك تالت","مالك رابع"],
  "مرتبات العاملين":["صلاح إسماعيل","علي مرعى","ريكو","رامي شلبي"],
  "الإيجارات":["إيجار شهري","مصاريف أذق"]
};
const EMPLOYEES=["صلاح إسماعيل","علي مرعى","ريكو","رامي شلبي"];
const REV_TYPES=["إيرادات عامة","إيجارات خارجية",...Object.keys(EXP_CATS)];
const INIT_USERS=[
  {id:1,username:"admin",password:"admin123",name:"أحمد الإدارة",role:"admin"},
  {id:2,username:"user1",password:"user123",name:"محمد المستخدم",role:"user"},
  {id:3,username:"hr1",password:"hr123",name:"مسؤول الموارد البشرية",role:"hr"},
  {id:4,username:"viewer1",password:"view123",name:"مشاهد",role:"viewer"}
];
// Role labels
const ROLE_LABELS={admin:"مدير النظام",user:"مستخدم",hr:"موارد بشرية",viewer:"مشاهد فقط"};

// ═══════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════
const SB_URL="https://qgqemasgnyfdsjmezjsh.supabase.co";
const SB_KEY="sb_publishable_Be_aAqJj_itUosit5wLiOA_M_4GSTck";
async function sbFetch(table,method="GET",body=null,filter=""){
  const r=await fetch(`${SB_URL}/rest/v1/${table}${filter}`,{
    method,
    headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,
      "Content-Type":"application/json","Prefer":method==="POST"?"return=representation":""},
    body:body?JSON.stringify(body):null
  });
  const t=await r.text();
  return t?JSON.parse(t):[];
}
const sbGet=(t)=>sbFetch(t,"GET",null,"?order=id.asc");
const sbUpsert=(t,row)=>sbFetch(t,"POST",row,"?on_conflict=id");
const sbDel=(t,id)=>sbFetch(t,"DELETE",null,"?id=eq."+id);

// ═══════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════
const K={U:"erp_u",C:"erp_c",S:"erp_s",E:"erp_e",P:"erp_p",X:"erp_x",Q:"erp_q",LS:"erp_ls"};
const TBL={erp_u:"users",erp_c:"clients",erp_s:"sales",erp_e:"expenses",erp_p:"payroll"};
const ld=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};
const gid=a=>Math.max(0,...a.map(x=>x.id))+1;
const toDay=()=>new Date().toISOString().slice(0,10);
const fmt=n=>(n||0).toLocaleString("ar-EG",{maximumFractionDigits:2});

// ═══════════════════════════════════════
// SYNC
// ═══════════════════════════════════════
let isOnline=navigator.onLine;
let syncPending=0;
let syncMsg="";

function updateSyncUI(){
  const dot1=document.getElementById("sync-dot");
  const txt=document.getElementById("sync-txt");
  const pend=document.getElementById("sync-pending");
  const barDot=document.getElementById("bar-dot");
  const barTxt=document.getElementById("bar-txt");
  const barBtn=document.getElementById("bar-sync-btn");
  const barStatus=document.getElementById("bar-status");
  const barEl=document.getElementById("sybar");
  const chip=document.getElementById("sync-chip");

  const q=ld(K.Q,[]);
  syncPending=q.length;

  if(!isOnline){
    if(dot1){dot1.className="dot r";txt.textContent="غير متصل";txt.style.color="var(--t2)"}
    if(barEl){barEl.className="sybar off";barDot.className="dot r";barTxt.textContent="غير متصل — البيانات محفوظة محلياً";barStatus.textContent="🔴"}
    if(pend)pend.style.display="none";
    if(barBtn)barBtn.style.display="none";
  } else if(syncMsg==="syncing"){
    if(dot1){dot1.className="dot s";txt.textContent="جاري المزامنة..."}
    if(barEl){barEl.className="sybar sy";barDot.className="dot s";barTxt.textContent="🔄 جاري المزامنة مع السحابة...";barStatus.textContent="🔄"}
    if(pend)pend.style.display="none";
    if(barBtn)barBtn.style.display="none";
  } else {
    if(dot1){dot1.className="dot g";txt.textContent=syncPending>0?`${syncPending} معلق`:"متصل"}
    if(barEl){barEl.className="sybar on";barDot.className="dot g";
      barTxt.textContent=syncMsg||( syncPending>0?`${syncPending} عملية معلقة`:"✅ متزامن");
      barStatus.textContent="🟢"}
    if(pend){pend.textContent=syncPending>0?`${syncPending}⏳`:"";pend.style.display=syncPending>0?"":"none"}
    if(barBtn)barBtn.style.display=syncPending>0?"":"none";
  }
}

async function pull(){
  for(const[k,t] of Object.entries(TBL)){
    try{
      const rows=await sbGet(t);
      if(k===K.U&&rows.length===0)continue;
      sv(k,rows);
    }catch{}
  }
}

async function drain(){
  const q=ld(K.Q,[]);
  syncMsg="syncing";updateSyncUI();
  try{
    for(const item of q){
      const t=TBL[item.t];if(!t)continue;
      if(item.op==="u"){
        const row={...item.p};
        if(row.desc!==undefined){row.description=row.desc;delete row.desc;}
        await sbUpsert(t,[row]);
      } else await sbDel(t,item.p.id);
    }
    await pull();
    sv(K.Q,[]);sv(K.LS,new Date().toISOString());
    syncMsg="✅ تمت المزامنة";updateSyncUI();
    setTimeout(()=>{syncMsg="";updateSyncUI();},3000);
    if(currentPage)renderPage(currentPage);
  } catch{
    syncMsg="⚠️ فشلت المزامنة";updateSyncUI();
    setTimeout(()=>{syncMsg="";updateSyncUI();},4000);
  }
}

function enq(t,op,p){
  const q=ld(K.Q,[]);
  const i=q.findIndex(x=>x.t===t&&x.p?.id===p?.id&&op==="u");
  i>=0?q[i]={t,op,p}:q.push({t,op,p});
  sv(K.Q,q);updateSyncUI();
  if(isOnline)drain();
}

function manualSync(){if(isOnline)drain();}

window.addEventListener("online",()=>{isOnline=true;updateSyncUI();drain();});
window.addEventListener("offline",()=>{isOnline=false;updateSyncUI();});

let currentUser=null;

async function doLogin(){
  const u=document.getElementById("l-user").value.trim();
  const p=document.getElementById("l-pass").value;
  let users=ld(K.U,INIT_USERS);
  if(navigator.onLine){
    try{const fresh=await sbGet("users");if(fresh&&fresh.length>0){users=fresh;sv(K.U,fresh);}}catch{}
  }
  const found=users.find(x=>x.username===u&&x.password===p);
  if(found){
    currentUser=found;
    document.getElementById("login-page").style.display="none";
    document.getElementById("main-app").style.display="";
    document.getElementById("user-avatar").textContent=(found.name||"U")[0];
    document.getElementById("user-name").textContent=found.name;
    document.getElementById("user-role").textContent=ROLE_LABELS[found.role]||"مستخدم";
    buildNav();
    updateSyncUI();
    if(isOnline)drain();
    // HR starts on payroll page, not dash
    const startPage=found.role==="hr"?"payroll":"dash";
    navigate(startPage);
    if(found.username==="admin"&&found.password==="admin123"){
      setTimeout(()=>alert("⚠️ تنبيه: يرجى تغيير كلمة السر الافتراضية من صفحة المستخدمين!"),1500);
    }
    // Auto logout after 8 hours
    setTimeout(()=>{doLogout();alert("⏰ انتهت جلستك. يرجى تسجيل الدخول مجدداً");},8*3600*1000);
  } else {
    const err=document.getElementById("l-err");
    err.textContent="اسم المستخدم أو كلمة المرور غير صحيحة";
    err.style.display="";
  }
}

function doLogout(){
  currentUser=null;

  document.getElementById("login-page").style.display="";

  document.getElementById("l-pass").value="";

  ]},
  {g:"الإدارة",items:[
    {id:"users",ic:"👥",l:"المستخدمون",roles:["admin"]},
    {id:"clients",ic:"👤",l:"العملاء",roles:["admin","user","viewer"]},

  ]},
  {g:"الإيرادات",items:[
    {id:"se",ic:"💼",l:"تسجيل المبيعات",roles:["admin","user"]},
    {id:"sv",ic:"📈",l:"بيان المبيعات",roles:["admin","user","viewer"]}
  ]},

    {id:"ee",ic:"🧾",l:"تسجيل المصاريف",roles:["admin","user"]},

    {id:"payroll-rep",ic:"📊",l:"تقارير المرتبات",roles:["admin","hr","user","viewer"]}
  ]},
  {g:"التقارير",items:[
    {id:"rep",ic:"📊",l:"التقارير",roles:["admin","user","viewer"]}
  ]},
];
const TITLES={dash:"لوحة التحكم",users:"المستخدمون",clients:"العملاء",lists:"القوائم",
  se:"تسجيل المبيعات",sv:"بيان المبيعات",ee:"تسجيل المصاريف",ev:"بيان المصاريف",
  payroll:"تسجيل المرتبات","payroll-view":"بيان المرتبات","payroll-rep":"تقارير المرتبات",rep:"التقارير"};

function canAccess(id){
  const role=currentUser?.role||"viewer";
  if(role==="admin")return true;
  const allItems=NAV_DEF.flatMap(g=>g.items);
  const item=allItems.find(x=>x.id===id);
  return !item||!item.roles||item.roles.includes(role);
}
function isReadOnly(){return currentUser?.role==="viewer";}

function buildNav(){
  const role=currentUser?.role||"viewer";
  const nav=document.getElementById("nav-links");
  nav.innerHTML="";
  NAV_DEF.forEach(group=>{
    const items=group.items.filter(it=>!it.roles||it.roles.includes(role));
    if(!items.length)return;
    const g=document.createElement("div");g.className="sng";
    g.innerHTML=`<div class="sngt">${group.g}</div>`;
    items.forEach(it=>{
      const d=document.createElement("div");
      d.className="sni"+(currentPage===it.id?" act":"");
      d.dataset.id=it.id;
      d.innerHTML=`<span style="font-size:15px;flex-shrink:0">${it.ic}</span>${it.l}`;
      d.onclick=()=>navigate(it.id);
      g.appendChild(d);
    });
    nav.appendChild(g);
  });
}

function navigate(id){
  if(!canAccess(id))return;
  currentPage=id;
  closeSide();
  document.getElementById("page-title").textContent=TITLES[id]||id;
  buildNav();
  renderPage(id);
}

function toggleSide(){
  const s=document.getElementById("sidebar");
  const o=document.getElementById("sov");
  s.classList.toggle("open");
  o.classList.toggle("show");
}
function closeSide(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sov").classList.remove("show");
}

function barChart(data,colorVar){
  // Simple CSS bar chart
  const max=Math.max(...data.map(x=>x.v),1);
  return data.map(x=>`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <div style="width:80px;font-size:12px;font-weight:600;color:var(--t1);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${x.l}</div>
      <div style="flex:1;height:22px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden;position:relative">
        <div style="height:100%;width:${max>0?Math.round(x.v/max*100):0}%;background:${colorVar};border-radius:4px;transition:width .5s ease;display:flex;align-items:center;padding-right:8px">
        </div>
      </div>
      <div style="width:90px;font-size:12px;font-weight:700;color:${colorVar};text-align:left">${fmt(x.v)}</div>
    </div>`).join("");
}

function miniLine(points,color){
  if(!points.length)return`<div style="color:var(--t3);font-size:12px;text-align:center;padding:20px">لا بيانات</div>`;
  const vals=points.map(p=>p.v);
  const max=Math.max(...vals,1),min=Math.min(...vals,0);
  const range=max-min||1;
  const W=300,H=80,pad=10;
  const pts=points.map((p,i)=>{
    const x=pad+(i/(points.length-1||1))*(W-pad*2);
    const y=H-pad-((p.v-min)/range)*(H-pad*2);
    return`${x},${y}`;
  });
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:80px">
    <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity=".3"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <polyline points="${pts.join(" ")}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>
    ${points.length>1?`<polygon points="${pts[0]},${H} ${pts.join(" ")} ${pts[pts.length-1].split(",")[0]},${H}" fill="url(#lg)"/>`:""}
    ${points.map((p,i)=>{
      const x=pad+(i/(points.length-1||1))*(W-pad*2);
      const y=H-pad-((p.v-min)/range)*(H-pad*2);
      return`<circle cx="${x}" cy="${y}" r="3" fill="${color}"/>
        <title>${p.l}: ${fmt(p.v)}</title>`;
    }).join("")}
  </svg>`;
}

function updateDash(){
  const fd=document.getElementById("df-from")?.value||"";
  const ft=document.getElementById("df-to")?.value||"";
  const fb=document.getElementById("df-boat")?.value||"";

  const sales=ld(K.S,[]);
  const exps=ld(K.E,[]);
  const pay=ld(K.P,[]);

  const inRange=d=>(!fd||d>=fd)&&(!ft||d<=ft);
  const fs=sales.filter(s=>inRange(s.date)&&(!fb||s.boat===fb));
  const fe=exps.filter(e=>inRange(e.date)&&(!fb||e.boat===fb));
  const fp=pay.filter(p=>inRange(p.date)&&(!fb||p.boat===fb));

  const rev=fs.reduce((a,s)=>a+(+s.total||0),0);
  const exp=fe.reduce((a,e)=>a+(+e.total||0),0);
  const payTotal=fp.reduce((a,p)=>a+(+p.amount||0),0);
  const net=rev-exp-payTotal;
  const kit=fe.filter(e=>e.exp_type==="المطابخ").reduce((a,e)=>a+(+e.total||0),0);
  const op=fe.filter(e=>e.exp_type==="مصاريف التشغيل").reduce((a,e)=>a+(+e.total||0),0);
  const adm=fe.filter(e=>e.exp_type==="المصاريف الإدارية").reduce((a,e)=>a+(+e.total||0),0);

  // ── KPI Cards ──
  const kpiEl=document.getElementById("d-kpi");
  if(kpiEl) kpiEl.innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px">
      ${[
        {ic:"💰",l:"إجمالي الإيرادات",v:rev,c:"var(--cy)",sub:`${fs.length} رحلة`},
        {ic:"📊",l:"إجمالي المصاريف",v:exp+payTotal,c:"var(--re)",sub:`مطابخ: ${fmt(kit)}`},
        {ic:"📈",l:"صافي الربح",v:net,c:net>=0?"var(--gr)":"var(--re)",sub:net>=0?"✅ ربح":"⚠️ خسارة"},
        {ic:"👥",l:"إجمالي المرتبات",v:payTotal,c:"var(--go)",sub:`${fp.length} سجل`},
      ].map(x=>`
        <div style="background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:20px;position:relative;overflow:hidden">
          <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${x.c}"></div>
          <div style="font-size:24px;margin-bottom:8px">${x.ic}</div>
          <div style="font-size:11px;color:var(--t2);margin-bottom:4px">${x.l}</div>
          <div style="font-size:22px;font-weight:800;color:${x.c}">${fmt(x.v)}</div>
          <div style="font-size:11px;color:var(--t3);margin-top:4px">${x.sub}</div>
        </div>`).join("")}
    </div>`;

  // ── Boats bar chart ──
  const boatsChartEl=document.getElementById("d-boats-chart");
  if(boatsChartEl){
    const boatData=BOATS.map(b=>({
      l:b,
      v:fs.filter(s=>s.boat===b).reduce((a,s)=>a+(+s.total||0),0)
    })).filter(x=>x.v>0).sort((a,b)=>b.v-a.v);
    boatsChartEl.innerHTML=`
      <div class="card">
        <div class="ch"><span class="ct">⛵ إيرادات المراكب</span></div>
        <div class="cb">
          ${boatData.length?barChart(boatData,"var(--cy)"):`<div class="empty">لا بيانات</div>`}
        </div>
      </div>`;
  }

  // ── Expenses pie-like bar chart ──
  const expChartEl=document.getElementById("d-exp-chart");
  if(expChartEl){
    const expData=[
      {l:"المطابخ",v:kit},
      {l:"التشغيل",v:op},
      {l:"الإدارية",v:adm},
      {l:"المرتبات",v:payTotal},
    ].filter(x=>x.v>0).sort((a,b)=>b.v-a.v);
    const totalExp=expData.reduce((a,x)=>a+x.v,0);
    expChartEl.innerHTML=`
      <div class="card">
        <div class="ch"><span class="ct">📊 توزيع المصاريف</span></div>
        <div class="cb">
          ${expData.length?expData.map((x,i)=>{
            const colors=["var(--go)","#60a5fa","var(--re)","var(--cy)"];
            const pct=totalExp>0?Math.round(x.v/totalExp*100):0;
            return`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
              <div style="width:10px;height:10px;border-radius:50%;background:${colors[i]};flex-shrink:0"></div>
              <div style="flex:1;font-size:12px;color:var(--t1)">${x.l}</div>
              <div style="width:120px;height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden">
                <div style="height:100%;width:${pct}%;background:${colors[i]};border-radius:4px"></div>
              </div>
              <div style="width:32px;font-size:11px;color:var(--t3)">${pct}%</div>
              <div style="width:80px;font-size:12px;font-weight:700;color:${colors[i]};text-align:left">${fmt(x.v)}</div>
            </div>`;
          }).join(""):`<div class="empty">لا بيانات</div>`}
        </div>
      </div>`;
  }

  // ── Boats table ──
  const boatsTblEl=document.getElementById("d-boats-table");
  if(boatsTblEl){
    const rows=BOATS.map(b=>{
      const br=fs.filter(s=>s.boat===b).reduce((a,s)=>a+(+s.total||0),0);
      const be=fe.filter(e=>e.boat===b).reduce((a,e)=>a+(+e.total||0),0);
      const bp2=fp.filter(p=>p.boat===b).reduce((a,p)=>a+(+p.amount||0),0);
      const bn=br-be-bp2;
      const trips=fs.filter(s=>s.boat===b).length;
      return{b,br,be,bp2,bn,trips};
    }).filter(r=>r.br>0||r.be>0);

    boatsTblEl.innerHTML=`<div class="card" style="margin-bottom:16px">
      <div class="ch"><span class="ct">⛵ ملخص المراكب</span></div>
      <div class="tw"><table>
        <thead><tr><th>المركب</th><th>الرحلات</th><th>الإيرادات</th><th>المصاريف</th><th>المرتبات</th><th>الصافي</th><th>الأداء</th></tr></thead>
        <tbody>${rows.length===0?`<tr><td colspan="7"><div class="empty">لا بيانات</div></td></tr>`:
          rows.map(r=>{
            const pct=r.br>0?Math.round(r.bn/r.br*100):0;
            const barColor=pct>=0?"var(--gr)":"var(--re)";
            return`<tr>
              <td>${bj("bc",r.b)}</td>
              <td style="text-align:center">${r.trips}</td>
              <td style="color:var(--gr);font-weight:700">${fmt(r.br)}</td>
              <td style="color:var(--re)">${fmt(r.be)}</td>
              <td style="color:var(--go)">${fmt(r.bp2)}</td>
              <td style="color:${r.bn>=0?"var(--gr)":"var(--re)"};font-weight:800">${fmt(r.bn)}</td>
              <td style="min-width:100px">
                <div style="display:flex;align-items:center;gap:6px">
                  <div style="flex:1;height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden">
                    <div style="height:100%;width:${Math.abs(pct)}%;max-width:100%;background:${barColor};border-radius:4px"></div>
                  </div>
                  <span style="font-size:11px;color:${barColor};font-weight:700;min-width:36px">${pct}%</span>
                </div>
              </td>
            </tr>`;
          }).join("")}
        </tbody>
      </table></div>
    </div>`;
  }

  // ── Daily trend (last 14 days) ──
  const trendsEl=document.getElementById("d-trends");
  if(trendsEl){
    // Get all dates in range
    const allDates=[...new Set([...fs.map(s=>s.date),...fe.map(e=>e.date)])].sort();
    const last=allDates.slice(-14);
    const revTrend=last.map(d=>({l:d.slice(5),v:fs.filter(s=>s.date===d).reduce((a,s)=>a+(+s.total||0),0)}));
    const expTrend=last.map(d=>({l:d.slice(5),v:fe.filter(e=>e.date===d).reduce((a,e)=>a+(+e.total||0),0)}));

    trendsEl.innerHTML=last.length<2?"":
    `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="card">
        <div class="ch"><span class="ct">📈 اتجاه الإيرادات</span><span style="font-size:11px;color:var(--t3)">(آخر ${last.length} يوم)</span></div>
        <div class="cb">
          ${miniLine(revTrend,"var(--cy)")}
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--t3);margin-top:4px">
            <span>${last[0]?.slice(5)||""}</span><span>${last[last.length-1]?.slice(5)||""}</span>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="ch"><span class="ct">📉 اتجاه المصاريف</span><span style="font-size:11px;color:var(--t3)">(آخر ${last.length} يوم)</span></div>
        <div class="cb">

function impSales(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const rows=e.target.result.split("\n").slice(1).filter(Boolean).map((row,i)=>{
        const c=row.split(",");
        return{id:gid([...ld(K.S,[]),{id:i}]),date:c[0]?.trim()||toDay(),rtype:c[1]?.trim()||"",
          center:c[2]?.trim()||"",boat:c[3]?.trim()||"",count:c[4]?.trim()||"",
          trip:+c[5]||0,kitchen:+c[6]||0,total:(+c[5]||0)+(+c[6]||0),
          notes:c[7]?.trim()||"",by_user:currentUser?.id};
      });
      const d=[...ld(K.S,[]),...rows];sv(K.S,d);
      rows.forEach(r2=>enq(K.S,"u",r2));
      alert(`تم استيراد ${rows.length} سجل`);renderPage("se");
    }catch{alert("خطأ في القراءة");}
  };
  r.readAsText(f);inp.value="";
}

function impExp(inp){

        const c=row.split(",");
        return{id:gid([...ld(K.E,[]),{id:i}]),date:c[0]?.trim()||toDay(),
          exp_type:c[1]?.trim()||"",name:c[2]?.trim()||"",
          description:c[3]?.trim()||"",egp:+c[4]||0,usd:0,eur:0,total:+c[4]||0,
          by_user:currentUser?.id};
      });
      const d=[...ld(K.E,[]),...rows];sv(K.E,d);
      rows.forEach(r2=>enq(K.E,"u",r2));
      alert(`تم استيراد ${rows.length} سجل`);renderPage("ee");

      <!-- Total card -->
      <div style="background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:20px;position:relative;overflow:hidden">
        <div style="position:absolute;top:0;left:0;right:0;height:3px;background:var(--go)"></div>
        <div style="font-size:12px;color:var(--t2);margin-bottom:6px">💰 إجمالي المرتبات</div>
        <div style="font-size:26px;font-weight:800;color:var(--go)">${fmt(total)}</div>
        <div style="font-size:11px;color:var(--t3);margin-top:4px">ج.م • ${data.length} سجل</div>
      </div>
      <!-- Per employee -->
      ${Object.entries(empMap).map(([emp,amt])=>`
        <div style="background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:20px;position:relative;overflow:hidden">
          <div style="position:absolute;top:0;left:0;right:0;height:3px;background:var(--cy)"></div>
          <div style="font-size:12px;color:var(--t2);margin-bottom:6px">👤 ${emp}</div>
          <div style="font-size:22px;font-weight:800;color:var(--cy)">${fmt(amt)}</div>
          <div style="font-size:11px;color:var(--t3);margin-top:4px">ج.م</div>
        </div>`).join("")}
    </div>
    <!-- Per boat breakdown -->
    ${Object.keys(boatMap).length>1?`<div class="card" style="margin-bottom:16px">
      <div class="ch"><span class="ct">⛵ توزيع حسب المركب</span></div>
      <div class="tw"><table>
        <thead><tr><th>المركب</th><th>إجمالي المرتبات</th><th>النسبة</th></tr></thead>
        <tbody>${Object.entries(boatMap).map(([b,amt])=>`<tr>
          <td>${bj("bc",b)}</td>
          <td style="color:var(--go);font-weight:700">${fmt(amt)} ج.م</td>
          <td>
            <div style="display:flex;align-items:center;gap:8px">
              <div style="flex:1;height:8px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden">
                <div style="height:100%;width:${total>0?Math.round(amt/total*100):0}%;background:var(--cy);border-radius:4px"></div>
              </div>
              <span style="font-size:12px;color:var(--t2);min-width:36px">${total>0?Math.round(amt/total*100):0}%</span>
            </div>
          </td>
        </tr>`).join("")}</tbody>
      </table></div>
    </div>`:""}`;

  // Detail table
  const tblEl=document.getElementById("pr-table");
  if(tblEl) tblEl.innerHTML=`<div class="card">
    <div class="ch">
      <span class="ct">📋 تفاصيل المرتبات</span>
      ${bj("bg2",data.length+" سجل")}
    </div>
    <div class="tw"><table>
      <thead><tr><th>#</th><th>التاريخ</th><th>المركب</th><th>الموظف</th><th>البيان</th><th>المبلغ</th><th>ملاحظات</th></tr></thead>
      <tbody>${data.length===0?`<tr><td colspan="7"><div class="empty">لا توجد بيانات بهذه الفلاتر</div></td></tr>`:
        data.map(p=>`<tr>
          <td>${p.id}</td>
          <td style="white-space:nowrap">${p.date}</td>
          <td>${bj("bc",p.boat||"")}</td>
          <td style="font-weight:700;color:var(--cy)">${p.employee||""}</td>
          <td>${p.description||""}</td>
          <td style="color:var(--go);font-weight:700">${fmt(p.amount)} ج.م</td>
          <td style="color:var(--t2)">${p.notes||""}</td>
        </tr>`).join("")}
      </tbody>
    </table></div>
    ${data.length>0?`<div style="padding:10px 16px;border-top:1px solid var(--bd);font-size:13px;display:flex;justify-content:space-between">
      <span>إجمالي: <strong style="color:var(--go)">${fmt(total)} ج.م</strong></span>
      <span style="color:var(--t3)">${data.length} سجل</span>
    </div>`:""}
  </div>`;
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
if(!localStorage.getItem(K.U))sv(K.U,INIT_USERS);
updateSyncUI();
setInterval(updateSyncUI,5000);
</script>
</body>
</html>
