<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#0d1b2e"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Daily Account Boats</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛵</text></svg>"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1b2e;--bg2:#112240;--bg3:#1a3358;
  --bl:#1d4ed8;--cy:#0891b2;--go:#d97706;
  --gr:#059669;--re:#dc2626;--pu:#7c3aed;
  --t1:#e2e8f0;--t2:#94a3b8;--t3:#475569;
  --bd:rgba(148,163,184,.15);
  --r:12px;--r2:8px;
}
html,body{
  background:var(--bg);color:var(--t1);direction:rtl;
  min-height:100vh;overflow-x:hidden;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  font-size:15px;-webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bl);border-radius:2px}

/* ── LAYOUT ── */
.app{display:flex;min-height:100vh;overflow-x:hidden}
.side{
  width:260px;min-height:100vh;background:var(--bg2);
  border-left:1px solid var(--bd);
  display:flex;flex-direction:column;
  position:fixed;right:0;top:0;bottom:0;z-index:200;
  transition:transform .25s ease;
}
.main{margin-right:260px;flex:1;display:flex;flex-direction:column;min-height:100vh;overflow-x:hidden}
.sov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199}
.sov.show{display:block}
.hmb{display:none;background:none;border:none;cursor:pointer;color:var(--t1);font-size:24px;padding:4px 8px;line-height:1}
.sclose-btn{display:none;background:none;border:none;cursor:pointer;color:var(--t2);font-size:18px;padding:2px 6px}

/* ── SIDEBAR ── */
.slogo{padding:18px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.sic{width:38px;height:38px;background:linear-gradient(135deg,var(--cy),var(--bl));
  border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.slt{font-size:13px;font-weight:800;line-height:1.2}
.sls{font-size:10px;color:var(--t2)}
.snav{flex:1;padding:8px;overflow-y:auto}
.sng{margin-bottom:4px}
.sngt{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;padding:6px 10px 3px}
.sni{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:var(--r2);
  cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);
  transition:background .12s,color .12s;position:relative;margin-bottom:1px}
.sni:hover{background:rgba(29,78,216,.15);color:var(--t1)}
.sni.act{background:linear-gradient(135deg,rgba(29,78,216,.25),rgba(8,145,178,.15));color:var(--cy);font-weight:600}
.sni.act::before{content:'';position:absolute;right:0;top:20%;bottom:20%;width:3px;background:var(--cy);border-radius:2px 0 0 2px}
.sni-sub{padding-right:28px;font-size:12px;border-right:2px solid rgba(8,145,178,.2);margin-right:10px}
.sfoot{padding:10px;border-top:1px solid var(--bd)}
.suc{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,.04);border-radius:var(--r2);border:1px solid var(--bd)}
.sua{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--go),var(--re));
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.sync-chip{margin-bottom:8px;padding:5px 8px;border-radius:6px;background:rgba(255,255,255,.04);
  border:1px solid var(--bd);font-size:10px;display:flex;align-items:center;gap:5px}

/* ── TOPBAR ── */
.top{height:56px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;
  background:rgba(13,27,46,.95);border-bottom:1px solid var(--bd);
  position:sticky;top:0;z-index:40}
.tpt{font-size:16px;font-weight:800;color:var(--cy)}

/* ── CONTENT ── */
.cnt{padding:18px 20px}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.ch{padding:12px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.ct{font-size:14px;font-weight:700}
.cb{padding:16px}

/* ── STATS ── */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.sc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:16px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sc.c::before{background:var(--cy)}.sc.g::before{background:var(--go)}
.sc.e::before{background:var(--gr)}.sc.r::before{background:var(--re)}
.sv{font-size:22px;font-weight:800;margin:5px 0 3px}
.sl{font-size:11px;color:var(--t2)}

/* ── TABLES ── */
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:rgba(29,78,216,.12);padding:10px 13px;text-align:right;
  font-size:11px;font-weight:700;color:var(--t2);border-bottom:1px solid var(--bd);white-space:nowrap}
tbody td{padding:10px 13px;border-bottom:1px solid rgba(148,163,184,.07);vertical-align:middle}
tbody tr:hover td{background:rgba(29,78,216,.05)}
tbody tr:last-child td{border-bottom:none}
.tda{display:flex;gap:4px;flex-wrap:nowrap}
.empty{text-align:center;padding:28px;color:var(--t3);font-size:13px}

/* ── FORMS ── */
.fg{display:flex;flex-direction:column;gap:12px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fr3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.fr4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.ff{display:flex;flex-direction:column;gap:4px}
label{font-size:11px;font-weight:600;color:var(--t2)}
input,select,textarea{
  background:#fff;border:1px solid #cbd5e1;border-radius:var(--r2);
  padding:9px 11px;font-family:inherit;font-size:14px;color:#0f2a4a;
  width:100%;direction:rtl;-webkit-appearance:none;
  transition:border-color .15s,box-shadow .15s;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--cy);box-shadow:0 0 0 3px rgba(8,145,178,.15)}
input::placeholder{color:#94a3b8}
input[readonly]{background:#f1f5f9;color:#64748b;cursor:default}
textarea{resize:vertical;min-height:64px}
select option{background:#fff;color:#0f2a4a}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* ── FILTER BAR ── */
.fb{display:flex;gap:10px;align-items:flex-end;padding:12px 18px;
  background:rgba(29,78,216,.06);border-bottom:1px solid var(--bd);flex-wrap:wrap}
.ffi{display:flex;flex-direction:column;gap:3px}
.ffi label{font-size:10px;font-weight:700;color:var(--t3)}
.ffi input,.ffi select{background:#fdf8f0;border-color:#d4c5a9;color:#0f2a4a;min-width:130px;font-size:12px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r2);
  font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .12s;white-space:nowrap}
.bp{background:var(--bl);color:#fff}.bp:hover{background:#1e40af}
.bg{background:rgba(255,255,255,.07);color:var(--t2);border:1px solid var(--bd)}.bg:hover{color:var(--t1);background:rgba(255,255,255,.12)}
.bd2{background:rgba(220,38,38,.12);color:var(--re);border:1px solid rgba(220,38,38,.25)}.bd2:hover{background:rgba(220,38,38,.2)}
.bs{background:rgba(5,150,105,.12);color:var(--gr);border:1px solid rgba(5,150,105,.25)}.bs:hover{background:rgba(5,150,105,.2)}
.sm{padding:4px 9px;font-size:11px}

/* ── BADGES ── */
.bj{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.bb{background:rgba(29,78,216,.18);color:#93c5fd}
.bc{background:rgba(8,145,178,.15);color:#67e8f9}
.bg2{background:rgba(217,119,6,.15);color:#fcd34d}
.be{background:rgba(5,150,105,.15);color:#6ee7b7}
.br{background:rgba(220,38,38,.15);color:#fca5a5}
.bpu{background:rgba(124,58,237,.15);color:#c4b5fd}

/* ── MODAL ── */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;align-items:center;justify-content:center;padding:14px}
.mo.show{display:flex}
.md{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);
  width:100%;max-width:820px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.mh{padding:14px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1}
.mht{font-size:14px;font-weight:800}
.mb{padding:20px}
.mf{padding:12px 20px;border-top:1px solid var(--bd);display:flex;gap:8px}
.xb{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer;line-height:1;padding:2px}
.xb:hover{color:var(--re)}

/* ── SYNC BAR ── */
.sybar{position:fixed;bottom:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 16px;font-size:11px;font-weight:600}
.sybar.on{background:rgba(13,27,46,.95);border-top:1px solid var(--bd)}
.sybar.off{background:rgba(127,29,29,.25);border-top:1px solid rgba(220,38,38,.3)}
.sybar.sy{background:rgba(7,89,133,.25);border-top:1px solid rgba(8,145,178,.3)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-left:4px;flex-shrink:0}
.dg{background:var(--gr)}.dr{background:var(--re)}.ds{background:var(--cy);animation:ps .7s alternate infinite}
@keyframes ps{from{opacity:.3}to{opacity:1}}

/* ── OFFLINE BANNER ── */
.ob{background:rgba(127,29,29,.2);border:1px solid rgba(220,38,38,.25);
  border-radius:var(--r2);padding:8px 12px;font-size:12px;color:#fca5a5;
  display:flex;align-items:center;gap:6px;margin-bottom:10px}

/* ── LOGIN ── */
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  background:#0a1628}
@keyframes wv{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.lc{width:100%;max-width:420px;margin:16px;
  background:rgba(5,20,50,.82);border:1px solid rgba(0,180,255,.2);
  border-radius:20px;padding:36px;backdrop-filter:blur(20px);
  position:relative;z-index:1;box-shadow:0 28px 60px rgba(0,0,0,.5)}
.lbrand{position:absolute;top:20px;right:24px;z-index:10;display:flex;align-items:center;gap:8px}
.lbrand-ic{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:20px}
.lbrand-t{font-size:13px;font-weight:800;color:rgba(255,255,255,.9)}
.lbrand-s{font-size:10px;color:rgba(255,255,255,.5)}

/* ── SLIDESHOW DOTS ── */
.ls-dots{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:5}
.ls-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.35);border:none;cursor:pointer;padding:0;transition:all .3s}
.ls-dot.act{background:#fff;width:20px;border-radius:3px}
.ls-cap{position:absolute;bottom:38px;right:28px;z-index:5;color:rgba(255,255,255,.6);font-size:12px}

/* ── SLIDESHOW SLIDES ── */
.ls-slide{position:absolute;inset:0;background-size:cover;background-position:center;
  opacity:0;transition:opacity 1.8s ease}
.ls-slide.act{opacity:1}

/* ── PENDING BADGE ── */
.pend-badge{background:rgba(245,158,11,.15);color:var(--go);border:1px solid rgba(245,158,11,.3);
  border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700}

/* ── MOBILE ── */
@media(max-width:900px){
  html,body{font-size:14px;overflow-x:hidden}
  .side{width:270px;transform:translateX(100%);max-width:88vw}
  .side.open{transform:translateX(0)}
  .main{margin-right:0!important;overflow-x:hidden;max-width:100vw}
  .app{overflow-x:hidden}
  .hmb{display:block}
  .sclose-btn{display:block}
  .tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:480px;font-size:12px}
  thead th{padding:7px 8px;font-size:10px}
  tbody td{padding:7px 8px}
  .sg{grid-template-columns:1fr 1fr;gap:8px}
  .sv{font-size:18px}
  .top{height:50px;padding:0 10px}
  .tpt{font-size:13px}
  .cnt{padding:8px;overflow-x:hidden}
  .card{margin-bottom:10px}
  .ch{padding:9px 10px}
  .cb{padding:10px}
  .ct{font-size:12px}
  .fr2{grid-template-columns:1fr 1fr;gap:8px}
  .fr3,.fr4{grid-template-columns:1fr 1fr;gap:8px}
  input,select,textarea{font-size:14px;padding:8px 10px}
  .fb{padding:8px 10px;gap:6px}
  .ffi{flex:1;min-width:0}
  .ffi input,.ffi select{min-width:0;width:100%;font-size:12px}
  .btn{font-size:11px;padding:5px 9px}
  .sm{padding:3px 7px;font-size:10px}
  #d-kpi>div{grid-template-columns:1fr 1fr!important}
  .mo{padding:6px}
  .md{max-height:96vh}
  .mb{padding:12px}
  .mh{padding:10px 12px}
  .mf{padding:8px 12px;gap:6px}
  .lc{padding:26px 20px;margin:10px}
  .sybar{padding:4px 10px;font-size:10px}
  .tda .btn{padding:3px 6px;font-size:10px}
}
@media(max-width:480px){
  .fr2,.fr3,.fr4{grid-template-columns:1fr 1fr}
  .sg{grid-template-columns:1fr 1fr}
  table{min-width:380px;font-size:11px}
  thead th{padding:5px 6px;font-size:9px}
  tbody td{padding:5px 6px}
  .cnt{padding:6px}
  .top{padding:0 8px}
  .tpt{font-size:12px}
  .lc{padding:20px 14px;margin:8px}
}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="login-page" class="lw" style="position:relative;z-index:10">
  <!-- SLIDESHOW BG (inside login only) -->
  <div id="ls-container" style="position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden">
    <div class="ls-slide act" style="background-image:url('https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=1400&q=80&auto=format')"></div>
    <div class="ls-slide" style="background-image:url('https://images.unsplash.com/photo-1559827260-dc66d52bef19?w=1400&q=80&auto=format')"></div>
    <div class="ls-slide" style="background-image:url('https://images.unsplash.com/photo-1567899378494-47b22a2ae96a?w=1400&q=80&auto=format')"></div>
    <div class="ls-slide" style="background-image:url('https://images.unsplash.com/photo-1506953823976-52e1fdc0149a?w=1400&q=80&auto=format')"></div>
    <div class="ls-slide" style="background-image:url('https://images.unsplash.com/photo-1540202404-a2f29016b523?w=1400&q=80&auto=format')"></div>
  </div>
  <div class="lbrand">
    <div class="lbrand-ic">⛵</div>
    <div><div class="lbrand-t">Daily Account Boats</div><div class="lbrand-s">شرم الشيخ • البحر الأحمر</div></div>
  </div>
  <div class="ls-dots" id="ls-dots"></div>
  <div class="ls-cap" id="ls-cap">شرم الشيخ • البحر الأحمر</div>
  <div class="lc">
    <div style="text-align:center;margin-bottom:24px">
      <div style="width:66px;height:66px;border-radius:50%;background:linear-gradient(135deg,rgba(8,145,178,.3),rgba(29,78,216,.3));border:2px solid rgba(8,145,178,.4);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px;box-shadow:0 0 28px rgba(8,145,178,.2)">⛵</div>
      <div style="font-size:20px;font-weight:900;color:#fff">Daily Account Boats</div>
      <div style="font-size:11px;color:rgba(148,216,255,.6);margin-top:5px;display:flex;align-items:center;justify-content:center;gap:8px">
        <span style="flex:1;height:1px;background:rgba(148,216,255,.2)"></span>إدارة مالية متكاملة<span style="flex:1;height:1px;background:rgba(148,216,255,.2)"></span>
      </div>
    </div>
    <div class="fg">
      <div class="ff">
        <label style="color:rgba(255,255,255,.6)">👤 اسم المستخدم</label>
        <input id="l-user" placeholder="username" autocomplete="username" style="background:#fff;border-color:#cbd5e1;color:#0f2a4a"/>
      </div>
      <div class="ff">
        <label style="color:rgba(255,255,255,.6)">🔑 كلمة المرور</label>
        <input id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password" style="background:#fff;border-color:#cbd5e1;color:#0f2a4a"/>
      </div>
      <div id="l-err" style="display:none;color:#fca5a5;font-size:12px;background:rgba(127,29,29,.3);padding:8px 12px;border-radius:8px;border:1px solid rgba(220,38,38,.3)"></div>
      <button id="login-btn" class="btn bp" style="justify-content:center;padding:12px;font-size:14px;font-weight:700;border-radius:12px;background:linear-gradient(135deg,#0891b2,#1d4ed8);box-shadow:0 4px 20px rgba(8,145,178,.35)">
        🔓 تسجيل الدخول
      </button>
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:4px">
        <input type="checkbox" id="l-remember" style="width:16px;height:16px;cursor:pointer;accent-color:#0891b2"/>
        <label for="l-remember" style="font-size:12px;color:rgba(148,216,255,.6);cursor:pointer">تذكرني لمدة 30 يوم</label>
      </div>
      <div style="text-align:center;font-size:10px;color:rgba(148,163,184,.35)">🔒 نظام محمي بكلمة مرور</div>
    </div>
  </div>
</div><!-- /login-page -->

<!-- MAIN APP (hidden until login) -->
<div id="main-app" style="display:none">
<div class="app">
  <div class="sov" id="sov"></div>
  <aside class="side" id="sidebar">
    <div class="slogo">
      <div class="sic">⛵</div>
      <div style="flex:1;min-width:0">
        <div class="slt">Daily Account Boats</div>
        <div class="sls">إدارة مالية يومية</div>
      </div>
      <button class="sclose-btn" id="sclose">✕</button>
    </div>
    <nav class="snav" id="nav-links"></nav>
    <div class="sfoot">
      <div class="sync-chip">
        <span class="dot dg" id="sync-dot"></span>
        <span id="sync-txt" style="flex:1;color:var(--t2);font-size:10px">متصل</span>
        <span id="sync-pend" style="display:none;color:var(--go);font-weight:700;font-size:10px"></span>
      </div>
      <div class="suc">
        <div class="sua" id="user-av">أ</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="user-nm">-</div>
          <div style="font-size:10px;color:var(--t3)" id="user-rl">-</div>
        </div>
        <button style="background:none;border:none;cursor:pointer;color:var(--re);font-size:15px" id="logout-btn" title="خروج">⏻</button>
      </div>
    </div>
  </aside>
  <main class="main">
    <div class="top">
      <button class="hmb" id="hmb-btn">☰</button>
      <div class="tpt" id="page-title">لوحة التحكم</div>
      <div style="display:flex;gap:6px;align-items:center;font-size:11px" id="top-right"></div>
    </div>
    <div class="cnt" id="app-content"></div>
  </main>
</div>
<div class="sybar on" id="sybar">
  <div style="display:flex;align-items:center;gap:5px">
    <span class="dot dg" id="bar-dot"></span>
    <span style="color:var(--t2)" id="bar-txt">متصل</span>
  </div>
  <div style="display:flex;gap:5px;align-items:center">
    <button class="btn bg sm" id="bar-sync-btn" style="display:none;font-size:10px" id="sync-btn-bar">🔄 مزامنة</button>
    <span id="bar-status" style="font-size:10px">🟢</span>

function sbFetch(tbl,method,body,filter){
  method = method||"GET";
  filter = filter||"?order=id.asc";
  var headers = {
    "apikey": SB_KEY,
    "Authorization": "Bearer "+SB_KEY,
    "Content-Type": "application/json",
    "Accept": "application/json"
  };
  if(method==="POST") headers["Prefer"] = "return=representation,resolution=merge-duplicates";
  if(method==="DELETE") headers["Prefer"] = "return=minimal";
  return fetch(SB_URL+"/rest/v1/"+tbl+filter,{
    method: method,
    headers: headers,
    body: body ? JSON.stringify(body) : undefined,
    mode: "cors"
  })
  .then(function(r){
    if(!r.ok){
      // Silent fail - don't log errors to console
      return [];
    }
    return r.text().then(function(t){
      try{return t?JSON.parse(t):[];}
      catch(e){return [];}
    });
  })
  .catch(function(e){
    // Silent fail - Supabase unavailable, use local data
    return [];
  });
}

function sbGet(t){return sbFetch(t,"GET",null,"?order=id.asc");}
function sbUpsert(t,row){return sbFetch(t,"POST",[row],"?on_conflict=id");}
function sbDel(t,id){return sbFetch(t,"DELETE",null,"?id=eq."+id);}

// ═══════════════════════════
// SYNC ENGINE
// ═══════════════════════════
var isOnline = navigator.onLine;
var draining = false;
var syncMsg = "";

// ═══════════════════════════════════════
// SYNC — Supabase is the single source of truth
// ═══════════════════════════════════════
var pulling = false;
var draining = false;

// Pull ALL data from Supabase and update localStorage
function pull(){
  if(pulling) return Promise.resolve();
  pulling = true;
  var tasks = Object.keys(TBL).map(function(k){
    return sbGet(TBL[k]).then(function(rows){
      if(!Array.isArray(rows)) return;
      // NEVER overwrite local data with empty array from Supabase
      if(rows.length === 0) return;
      sv(k, rows);
    }).catch(function(e){ console.warn("Pull failed for",TBL[k],e); });
  });
  return Promise.all(tasks).finally(function(){ pulling = false; });
}

// Push a single record to Supabase immediately
function pushNow(tableKey, op, rec){
  var tbl = TBL[tableKey];
  if(!tbl || !isOnline) return Promise.resolve();
  if(op==="u") return sbUpsert(tbl, rec).catch(function(){});
  else return sbDel(tbl, rec.id).catch(function(){});
}

// Save locally AND push to Supabase immediately
function enq(k, op, rec){
  // 1. Save to localStorage first (instant, always works)
  var local = ld(k, []);
  if(op==="u"){
    var idx = -1;
    local.forEach(function(x,i){ if(x.id===rec.id) idx=i; });
    if(idx>=0) local[idx]=rec; else local.push(rec);
    sv(k, local);
  } else {
    sv(k, local.filter(function(x){ return x.id!==rec.id; }));
  }
  updateSyncUI("ok");
  // 2. Push to Supabase if online (fire and forget - don't pull after)
  if(isOnline){
    pushNow(k, op, rec).then(function(){
      updateSyncUI("ok");
      console.log("Saved to Supabase:", TBL[k], rec.id);
    }).catch(function(e){
      console.warn("Supabase save failed, kept in local:", e);
    });
  }
}

function manualSync(){
  if(!isOnline){ alert("لا يوجد اتصال بالإنترنت"); return; }
  updateSyncUI("syncing");
  // Push any dirty local data and pull fresh
  pull().then(function(){
    updateSyncUI("ok");
    if(currentUser && currentPage) renderPage(currentPage);
  });
}

function drain(){
  // Background sync - pull from Supabase and merge (never wipe local)
  if(draining||!isOnline) return;
  draining=true;
  pull().then(function(){
    updateSyncUI("ok");
  }).finally(function(){ draining=false; });
}

function exportExcel(data,cols,fname){
  if(!data||!data.length){alert("لا توجد بيانات للتصدير");return;}
  var wsData=[cols.map(function(c){return c.l;})];
  data.forEach(function(row){
    wsData.push(cols.map(function(c){
      var v=row[c.k];
      if(v!==undefined&&v!==null&&v!==""){var n=Number(v);if(!isNaN(n))return n;}
      return v||"";
    }));
  });
  function doWrite(){
    try{
      var wb=XLSX.utils.book_new();
      var ws=XLSX.utils.aoa_to_sheet(wsData);
      ws["!cols"]=cols.map(function(){return{wch:20};});
      XLSX.utils.book_append_sheet(wb,ws,"بيانات");
      XLSX.writeFile(wb,fname+"_"+toDay()+".xlsx");
    }catch(err){alert("خطأ في التصدير: "+err.message);}
  }
  if(window.XLSX){doWrite();}
  else{
    var s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
    s.onload=doWrite;
    document.head.appendChild(s);
    alert("جاري تحميل مكتبة Excel... اضغط تصدير مرة أخرى.");
  }
}

  var allItems=[];
  NAV.forEach(function(g){

      allItems.push(it);
      if(it.sub) it.sub.forEach(function(s){allItems.push(s);});
    });
  });
  var item=null;
  allItems.forEach(function(x){if(x.id===id) item=x;});
  if(!item) return true;
  return !item.roles||item.roles.indexOf(role)>=0;

  s.classList.toggle("open");o.classList.toggle("show");
}
function closeSide(){
  var s=el("sidebar"),o=el("sov");
  if(s)s.classList.remove("open");if(o)o.classList.remove("show");
}

// ═══════════════════════════
// MODAL
// ═══════════════════════════
function openModal(title,body,saveLbl,saveFn){
  el("modal-title").textContent=title;
  el("modal-body").innerHTML=body;
  var mf=el("modal-footer");mf.innerHTML="";
  if(saveFn){
    var sb=document.createElement("button");sb.className="btn bp";
    sb.textContent="💾 "+(saveLbl||"حفظ");
    sb.onclick=saveFn;mf.appendChild(sb);
  }
  var cb=document.createElement("button");cb.className="btn bg";
  cb.textContent="إلغاء";cb.onclick=closeModal;mf.appendChild(cb);
  el("modal").classList.add("show");
}
function closeModal(){el("modal").classList.remove("show");}

// ═══════════════════════════
// RENDER PAGES
// ═══════════════════════════
function renderPage(id){
  var c=el("app-content");if(!c)return;
  if(id==="users"&&currentUser.role!=="admin"){renderPage("dash");return;}
  c.innerHTML=offl();
  switch(id){
    case"dash":      c.innerHTML+=renderDash();   setTimeout(attachDash,30);   break;
    case"users":     c.innerHTML+=renderUsers();  break;
    case"clients":   c.innerHTML+=renderClients();break;
    case"lists":     c.innerHTML+=renderLists();  break;
    case"se":        c.innerHTML+=renderSE();     attachSE();  break;
    case"sv":        c.innerHTML+=renderSV();     attachSV();  break;
    case"ee":        c.innerHTML+=renderEE();     attachEE();  break;
    case"ev":        c.innerHTML+=renderEV();     attachEV();  break;
    case"payroll":   c.innerHTML+=renderPayroll();attachPayroll();break;
    case"payroll-view":c.innerHTML+=renderPayView();attachPayView();break;
    case"payroll-rep": c.innerHTML+=renderPayRep(); attachPayRep(); break;
    case"rep":       c.innerHTML+=renderRep();    attachRep(); break;
    default: c.innerHTML+=renderDash(); setTimeout(attachDash,30);
  }
}

// DASHBOARD
// ═══════════════════════════
function renderDash(){
  var d=toDay(),m=d.slice(0,7);
  return '<div class="card" style="margin-bottom:14px">'+
    '<div class="fb">'+
    '<div class="ffi"><label>📅 من</label><input type="date" id="df-from" value="'+m+'-01"/></div>'+
    '<div class="ffi"><label>📅 إلى</label><input type="date" id="df-to" value="'+d+'"/></div>'+
    '<div class="ffi"><label>⛵ المركب</label><select id="df-boat"><option value="">كل المراكب</option>'+
    BOATS.map(function(b){return'<option>'+b+'</option>';}).join("")+'</select></div>'+
    '<div style="display:flex;gap:6px;align-items:flex-end">'+
    '<button class="btn bp sm" onclick="updateDash()">🔍</button>'+
    '<button class="btn bg sm" onclick="resetDash()">↺</button></div>'+
    '</div></div>'+
    '<div id="d-kpi" style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px"></div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px" id="d-charts"></div>'+
    '<div id="d-boats" style="margin-bottom:14px"></div>'+
    '<div id="d-recent"></div>';
}
function attachDash(){
  ["df-from","df-to","df-boat"].forEach(function(i){
    var e=el(i);if(e)e.addEventListener("change",updateDash);
  });
  updateDash();
}
function resetDash(){
  var d=toDay(),m=d.slice(0,7);
  var f=el("df-from"),t=el("df-to"),b=el("df-boat");
  if(f)f.value=m+"-01";if(t)t.value=d;if(b)b.value="";
  updateDash();
}
function updateDash(){
  var kpi=el("d-kpi");if(!kpi)return;
  var fd=el("df-from")?el("df-from").value:"";
  var ft=el("df-to")?el("df-to").value:"";
  var fb=el("df-boat")?el("df-boat").value:"";
  var sales=ld(K.S,[]);var exps=ld(K.E,[]);var pays=ld(K.P,[]);
  function inR(d){return(!fd||d>=fd)&&(!ft||d<=ft);}
  var fs=sales.filter(function(s){return inR(s.date)&&(!fb||s.boat===fb);});
  var fe=exps.filter(function(e){return inR(e.date)&&(!fb||e.boat===fb);});
  var fp=pays.filter(function(p){return inR(p.date)&&(!fb||p.boat===fb);});
  var rev=fs.reduce(function(a,s){return a+(+s.total||0);},0);
  var exp=fe.reduce(function(a,e){return a+(+e.total||0);},0);
  var payT=fp.reduce(function(a,p){return a+(+p.amount||0);},0);
  var net=rev-exp-payT;
  var kit=fe.filter(function(e){return e.exp_type==="المطابخ";}).reduce(function(a,e){return a+(+e.total||0);},0);
  var opX=fe.filter(function(e){return e.exp_type==="مصاريف التشغيل";}).reduce(function(a,e){return a+(+e.total||0);},0);
  var adm=fe.filter(function(e){return e.exp_type==="المصاريف الإدارية";}).reduce(function(a,e){return a+(+e.total||0);},0);
  // KPI
  var kpis=[
    {ic:"💰",l:"إجمالي الإيرادات",v:rev,c:"var(--cy)",sub:fs.length+" رحلة"},
    {ic:"📊",l:"إجمالي المصاريف",v:exp+payT,c:"var(--re)",sub:"مطابخ: "+fmt(kit)},
    {ic:"📈",l:"صافي الربح",v:net,c:net>=0?"var(--gr)":"var(--re)",sub:net>=0?"✅ ربح":"⚠️ خسارة"},
    {ic:"👥",l:"إجمالي المرتبات",v:payT,c:"var(--go)",sub:fp.length+" سجل"}
  ];
  kpi.innerHTML=kpis.map(function(x){
    return '<div style="background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:18px;position:relative;overflow:hidden">'+
      '<div style="position:absolute;top:0;left:0;right:0;height:3px;background:'+x.c+'"></div>'+
      '<div style="font-size:22px;margin-bottom:6px">'+x.ic+'</div>'+
      '<div style="font-size:11px;color:var(--t2);margin-bottom:4px">'+x.l+'</div>'+
      '<div style="font-size:20px;font-weight:800;color:'+x.c+'">'+fmt(x.v)+'</div>'+
      '<div style="font-size:10px;color:var(--t3);margin-top:3px">'+x.sub+'</div></div>';
  }).join("");
  // Charts
  var ch=el("d-charts");
  if(ch){
    var bmax=0;
    var bdata=BOATS.map(function(b){
      var v=fs.filter(function(s){return s.boat===b;}).reduce(function(a,s){return a+(+s.total||0);},0);
      if(v>bmax)bmax=v;return{l:b,v:v};
    }).filter(function(x){return x.v>0;}).sort(function(a,b2){return b2.v-a.v;});
    var colors=["var(--go)","#60a5fa","var(--re)","var(--cy)"];
    var edata=[{l:"المطابخ",v:kit},{l:"التشغيل",v:opX},{l:"الإدارية",v:adm},{l:"المرتبات",v:payT}].filter(function(x){return x.v>0;});
    var etot=edata.reduce(function(a,x){return a+x.v;},0);
    ch.innerHTML=
      '<div class="card"><div class="ch"><span class="ct">⛵ إيرادات المراكب</span></div><div class="cb">'+
      (bdata.length?bdata.map(function(x){
        var p=bmax>0?Math.round(x.v/bmax*100):0;
        return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'+
          '<div style="width:65px;font-size:11px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+x.l+'</div>'+
          '<div style="flex:1;height:18px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden">'+
          '<div style="height:100%;width:'+p+'%;background:var(--cy);border-radius:3px;transition:width .5s"></div></div>'+
          '<div style="width:80px;font-size:11px;font-weight:700;color:var(--cy);text-align:left">'+fmt(x.v)+'</div></div>';
      }).join(""):'<div class="empty">لا بيانات</div>')+'</div></div>'+
      '<div class="card"><div class="ch"><span class="ct">📊 توزيع المصاريف</span></div><div class="cb">'+
      (edata.length?edata.map(function(x,i){
        var p=etot>0?Math.round(x.v/etot*100):0;
        return '<div style="display:flex;align-items:center;gap:7px;margin-bottom:9px">'+
          '<div style="width:9px;height:9px;border-radius:50%;background:'+colors[i%4]+';flex-shrink:0"></div>'+
          '<div style="flex:1;font-size:11px;color:var(--t1)">'+x.l+'</div>'+
          '<div style="width:90px;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden">'+
          '<div style="height:100%;width:'+p+'%;background:'+colors[i%4]+';border-radius:3px"></div></div>'+
          '<div style="width:25px;font-size:10px;color:var(--t3)">'+p+'%</div>'+
          '<div style="width:70px;font-size:11px;font-weight:700;color:'+colors[i%4]+';text-align:left">'+fmt(x.v)+'</div></div>';
      }).join(""):'<div class="empty">لا بيانات</div>')+'</div></div>';
  }
  // Boats table
  var bt=el("d-boats");
  if(bt){
    var rows=BOATS.map(function(b){
      var br=fs.filter(function(s){return s.boat===b;}).reduce(function(a,s){return a+(+s.total||0);},0);
      var be=fe.filter(function(e){return e.boat===b;}).reduce(function(a,e){return a+(+e.total||0);},0);
      var bp=fp.filter(function(p){return p.boat===b;}).reduce(function(a,p){return a+(+p.amount||0);},0);
      var bn=br-be-bp;var tr=fs.filter(function(s){return s.boat===b;}).length;
      return{b:b,br:br,be:be,bp:bp,bn:bn,tr:tr};
    }).filter(function(r){return r.br>0||r.be>0;});
    bt.innerHTML='<div class="card"><div class="ch"><span class="ct">⛵ ملخص المراكب</span></div>'+
      '<div class="tw"><table><thead><tr><th>المركب</th><th>الرحلات</th><th>الإيرادات</th><th>المصاريف</th><th>المرتبات</th><th>الصافي</th></tr></thead><tbody>'+
      (rows.length?rows.map(function(r){
        return '<tr><td>'+bj("bc",r.b)+'</td><td style="text-align:center">'+r.tr+'</td>'+
          '<td style="color:var(--gr);font-weight:700">'+fmt(r.br)+'</td>'+
          '<td style="color:var(--re)">'+fmt(r.be)+'</td>'+
          '<td style="color:var(--go)">'+fmt(r.bp)+'</td>'+
          '<td style="color:'+(r.bn>=0?"var(--gr)":"var(--re)")+';font-weight:800">'+fmt(r.bn)+'</td></tr>';
      }).join(""):'<tr><td colspan="6"><div class="empty">لا بيانات</div></td></tr>')+'</tbody></table></div></div>';
  }
  // Recent
  var rc=el("d-recent");
  if(rc){
    var recent=fs.slice().sort(function(a,b){return b.date.localeCompare(a.date);}).slice(0,5);
    rc.innerHTML='<div class="card"><div class="ch"><span class="ct">🕐 آخر المبيعات</span></div>'+
      '<div class="tw"><table><thead><tr><th>التاريخ</th><th>المركب</th><th>السنتر</th><th>الطلعة</th><th>المطبخ</th><th>الإجمالي</th></tr></thead><tbody>'+
      (recent.length?recent.map(function(s){
        return '<tr><td>'+s.date+'</td><td>'+bj("bc",s.boat||"")+'</td><td>'+(s.center||"-")+'</td>'+
          '<td style="color:var(--cy)">'+fmt(s.trip)+'</td>'+
          '<td style="color:var(--go)">'+fmt(s.kitchen)+'</td>'+
          '<td style="color:var(--gr);font-weight:700">'+fmt(s.total)+'</td></tr>';
      }).join(""):'<tr><td colspan="6"><div class="empty">لا بيانات بعد</div></td></tr>')+'</tbody></table></div></div>';
  }
}

function renderUsers(){
  var users=ld(K.U,INIT_USERS);
  var isAdmin=currentUser.role==="admin";
  var ro=currentUser.role==="viewer";
  return '<div class="card"><div class="ch"><span class="ct">👥 المستخدمون</span>'+
    (!ro&&isAdmin?'<button class="btn bp sm" onclick="userForm()">+ إضافة</button>':"")+
    '</div><div class="tw"><table><thead><tr><th>#</th><th>الاسم</th><th>المستخدم</th><th>الدور</th><th></th></tr></thead><tbody>'+
    users.map(function(u){
      var roleBadge={admin:bj("bg2","مدير"),user:bj("bc","مستخدم"),hr:bj("be","HR"),viewer:bj("br","مشاهد")}[u.role]||bj("bc",u.role);
      var canEdit=!ro&&(isAdmin||u.id===currentUser.id);
      var canDel=!ro&&isAdmin&&u.id!==currentUser.id;
      return '<tr><td>'+u.id+'</td><td style="font-weight:600">'+u.name+'</td>'+
        '<td>'+bj("bb",u.username)+'</td><td>'+roleBadge+'</td>'+
        '<td><div class="tda">'+
        (canEdit?'<button class="btn bg sm" onclick="userForm('+u.id+')">✏️</button>':"")+
        (canDel?'<button class="btn bd2 sm" onclick="delUser('+u.id+')">🗑</button>':"")+
        '</div></td></tr>';
    }).join("")+'</tbody></table></div></div>';
}
function userForm(id){
  var users=ld(K.U,INIT_USERS);
  var u=id?users.filter(function(x){return x.id===id;})[0]:{id:null,username:"",password:"",name:"",role:"user"};
  if(!u) return;
  openModal(id?"تعديل المستخدم":"إضافة مستخدم",
    '<div class="fr2">'+
    '<div class="ff"><label>الاسم الكامل</label><input id="u-name" value="'+escHtml(u.name)+'"/></div>'+
    '<div class="ff"><label>اسم المستخدم</label><input id="u-user" value="'+escHtml(u.username)+'"/></div>'+
    '<div class="ff"><label>كلمة المرور</label><input id="u-pass" type="password" value="'+escHtml(u.password)+'"/></div>'+
    '<div class="ff"><label>الدور</label><select id="u-role">'+
    '<option value="admin"'+(u.role==="admin"?" selected":"")+'>مدير</option>'+
    '<option value="user"'+(u.role==="user"?" selected":"")+'>مستخدم</option>'+
    '<option value="hr"'+(u.role==="hr"?" selected":"")+'>موارد بشرية</option>'+
    '<option value="viewer"'+(u.role==="viewer"?" selected":"")+'>مشاهد فقط</option>'+
    '</select></div></div>',
    "حفظ",function(){
      var nm=el("u-name").value.trim(),un=el("u-user").value.trim(),pw=el("u-pass").value,rl=el("u-role").value;
      if(!nm||!un||!pw){alert("يرجى ملء الحقول");return;}
      var users2=ld(K.U,INIT_USERS);
      var rec={id:id||gid(users2),username:un,password:pw,name:nm,role:rl};
      var newU=id?users2.map(function(x){return x.id===id?rec:x;}):users2.concat([rec]);
      sv(K.U,newU);enq(K.U,"u",rec);closeModal();renderPage("users");
    });
}
function delUser(id){
  if(!confirm("حذف المستخدم؟")) return;
  var users=ld(K.U,INIT_USERS);
  var rec=users.filter(function(x){return x.id===id;})[0];
  sv(K.U,users.filter(function(x){return x.id!==id;}));
  if(rec) enq(K.U,"d",rec);
  renderPage("users");
}

var listsTab="b";
function switchListTab(t){listsTab=t;renderPage("lists");}
function renderLists(){
  var isHR=currentUser.role==="hr";
  if(isHR) return renderHRList();
  return '<div style="display:flex;gap:8px;margin-bottom:12px">'+
    '<button class="btn '+(listsTab==="b"?"bp":"bg")+'" onclick="switchListTab(\'b\')">⛵ المراكب</button>'+
    '<button class="btn '+(listsTab==="e"?"bp":"bg")+'" onclick="switchListTab(\'e\')">📋 المصاريف</button></div>'+
    (listsTab==="b"?renderBoatsList():renderExpLists());
}
function renderHRList(){
  var items=EXP_CATS["مرتبات العاملين"]||[];
  return '<div class="card"><div class="ch"><span class="ct">👥 مرتبات العاملين</span></div><div class="cb">'+
    '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">'+
    items.map(function(it,i){
      return '<div style="display:flex;align-items:center;gap:4px;background:rgba(5,150,105,.1);border:1px solid rgba(5,150,105,.25);border-radius:7px;padding:5px 10px;font-size:12px;font-weight:600">'+
        '👤 '+it+'<button style="background:none;border:none;cursor:pointer;color:var(--re);font-size:11px" onclick="rmHREmp('+i+')">✕</button></div>';
    }).join("")+
    '</div><div style="display:flex;gap:8px"><input id="hr-emp-input" placeholder="إضافة موظف..." style="flex:1"/>'+
    '<button class="btn bp sm" onclick="addHREmp()">+</button></div></div></div>';
}
function addHREmp(){
  var v=el("hr-emp-input")&&el("hr-emp-input").value.trim();
  if(v){EXP_CATS["مرتبات العاملين"].push(v);EMPLOYEES.push(v);saveLists();renderPage("lists");}
}
function rmHREmp(i){EXP_CATS["مرتبات العاملين"].splice(i,1);saveLists();renderPage("lists");}
function renderBoatsList(){
  return '<div class="card"><div class="ch"><span class="ct">⛵ المراكب</span></div><div class="cb">'+
    '<div style="display:flex;gap:8px;margin-bottom:10px"><input id="new-boat" placeholder="مركب جديد..." style="flex:1"/>'+
    '<button class="btn bp sm" onclick="addBoat()">+</button></div>'+
    '<div style="display:flex;flex-wrap:wrap;gap:6px">'+
    BOATS.map(function(b,i){
      return '<div style="display:flex;align-items:center;gap:4px;background:rgba(8,145,178,.1);border:1px solid var(--bd);border-radius:7px;padding:5px 10px;font-size:12px">'+
        '⛵ '+b+'<button style="background:none;border:none;cursor:pointer;color:var(--re);font-size:11px" onclick="rmBoat('+i+')">✕</button></div>';
    }).join("")+'</div></div></div>';
}
function addBoat(){var v=el("new-boat").value.trim();if(v){BOATS.push(v);saveLists();renderPage("lists");}}
function rmBoat(i){BOATS.splice(i,1);saveLists();renderPage("lists");}
function renderExpLists(){
  var cats=Object.keys(EXP_CATS);
  return '<div class="card"><div class="ch"><span class="ct">📋 فئات المصاريف</span>'+
    '<div style="display:flex;gap:6px"><input id="new-cat" placeholder="فئة جديدة..." style="max-width:160px;font-size:12px;padding:5px 8px"/>'+
    '<button class="btn bp sm" onclick="addCat()">+ فئة</button></div></div><div class="cb">'+
    cats.map(function(cat,ci){

function payrollForm(id,isPend){
  var allData=ld(K.PP,[]).concat(ld(K.P,[]));

  p=p||{date:toDay(),rtype:"إيرادات عامة",boat:BOATS[0],employee:"",description:"",amount:"",notes:""};

    '<div class="ff"><label>👤 الموظف</label><select id="p-emp"><option value="">-- اختر --</option>'+EMPLOYEES.map(function(e){return'<option'+(p.employee===e?" selected":"")+'>'+e+'</option>';}).join("")+'</select></div>'+
    '<div class="ff"><label>المبلغ (ج.م)</label><input id="p-amount" type="number" value="'+(p.amount||"")+'"/></div></div>'+
    '<div class="ff"><label>البيان</label><textarea id="p-desc" rows="2">'+(p.description||"")+'</textarea></div>'+

      var isAdmin=currentUser.role==="admin";
      var pendingEdit=isPend?true:false;
      var emp=el("p-emp").value;if(!emp){alert("يرجى اختيار الموظف");return;}
      var isPayPend=!isAdmin||pendingEdit;
      var sk=isPayPend?K.PP:K.P;
      var data=ld(sk,[]);
      var rec={id:id||gid(ld(K.P,[]).concat(ld(K.PP,[]))),
        date:el("p-date").value,rtype:el("p-rtype").value,
        boat:el("p-boat").value,employee:emp,
        description:el("p-desc").value,
        amount:+el("p-amount").value||0,
        notes:el("p-notes").value,
        by_user:currentUser.id,_pending:isPayPend};
      sv(sk,id?data.map(function(x){return x.id===id?rec:x;}):data.concat([rec]));
      if(!isPayPend) enq(K.P,"u",rec);
      closeModal();renderPage("payroll");
    });
}
function approvePayroll(id){
  var pending=ld(K.PP,[]);
  var rec=pending.filter(function(x){return x.id===id;})[0];if(!rec) return;
  rec._pending=false;
  sv(K.P,ld(K.P,[]).concat([rec]));
  sv(K.PP,pending.filter(function(x){return x.id!==id;}));
  enq(K.P,"u",rec);renderPage("payroll");
  alert("✅ تمت الموافقة وحفظ المرتب في البيان النهائي");
}
function delPayroll(id,isPend){
  if(!confirm("حذف؟")) return;
  var pk=isPend?K.PP:K.P;
  var d=ld(pk,[]);var rec=d.filter(function(x){return x.id===id;})[0];
  sv(pk,d.filter(function(x){return x.id!==id;}));
  if(!isPend&&rec) enq(K.P,"d",rec);
  renderPage("payroll");
}

  var fb=el("rp-boat")?el("rp-boat").value:"";
  var sales=ld(K.S,[]);var exps=ld(K.E,[]);
  var dates=[];
  sales.forEach(function(s){if(dates.indexOf(s.date)<0)dates.push(s.date);});
  exps.forEach(function(e){if(dates.indexOf(e.date)<0)dates.push(e.date);});
  dates.sort(function(a,b){return b.localeCompare(a);});
  if(fd) dates=dates.filter(function(d){return d===fd;});
  var tblEl=el("rep-tbl");if(!tblEl) return;
  tblEl.innerHTML='<div class="card"><div class="ch"><span class="ct">📊 التقارير اليومية التفصيلية</span></div>'+
    '<div class="tw"><table><thead><tr><th>التاريخ</th><th>الإيرادات</th><th>مصاريف مطابخ</th><th>صافي 1</th><th>مصاريف تشغيل</th><th>صافي 2</th><th>مصاريف إدارية</th><th>الصافي النهائي</th></tr></thead><tbody>'+
    (dates.length?dates.map(function(d){
      var rev=sales.filter(function(s){return s.date===d&&(!fb||s.boat===fb);}).reduce(function(a,s){return a+(+s.total||0);},0);
      var kit=exps.filter(function(e){return e.date===d&&(!fb||e.boat===fb)&&e.exp_type==="المطابخ";}).reduce(function(a,e){return a+(+e.total||0);},0);
      var op=exps.filter(function(e){return e.date===d&&(!fb||e.boat===fb)&&e.exp_type==="مصاريف التشغيل";}).reduce(function(a,e){return a+(+e.total||0);},0);
      var adm=exps.filter(function(e){return e.date===d&&(!fb||e.boat===fb)&&e.exp_type==="المصاريف الإدارية";}).reduce(function(a,e){return a+(+e.total||0);},0);
      var s1=rev-kit,s2=s1-op,fn=s2-adm;
      return '<tr>'+
        '<td style="font-weight:700;white-space:nowrap">'+d+'</td>'+
        '<td style="color:var(--gr);font-weight:700">'+fmt(rev)+'</td>'+
        '<td style="color:var(--re)">'+fmt(kit)+'</td>'+
        '<td style="color:'+(s1>=0?"var(--cy)":"var(--re)")+';font-weight:600">'+fmt(s1)+'</td>'+
        '<td style="color:var(--re)">'+fmt(op)+'</td>'+
        '<td style="color:'+(s2>=0?"var(--cy)":"var(--re)")+';font-weight:600">'+fmt(s2)+'</td>'+
        '<td style="color:var(--re)">'+fmt(adm)+'</td>'+
        '<td style="color:'+(fn>=0?"var(--gr)":"var(--re)")+';font-weight:800;font-size:14px">'+fmt(fn)+'</td></tr>';
    }).join(""):'<tr><td colspan="8"><div class="empty">لا بيانات</div></td></tr>')+'</tbody></table></div></div>';
}

// EVENT LISTENERS (after DOM ready)
// ═══════════════════════════
window.addEventListener("DOMContentLoaded", function(){
  // Auto-login
  try{
    var _s=JSON.parse(localStorage.getItem("erp_session")||"null");
    if(_s&&_s.t&&(Date.now()-_s.t)<30*24*3600*1000){
      var _users=ld(K.U,INIT_USERS),_found=null;
      _users.forEach(function(u){if(u.username===_s.u&&u.password===_s.p)_found=u;});
      if(_found){
        currentUser=_found;
        el("login-page").style.display="none";
        el("main-app").style.display="";
        el("user-av").textContent=(_found.name||"U")[0];
        el("user-nm").textContent=_found.name;
        el("user-rl").textContent=ROLE_LABELS[_found.role]||_found.role;
        buildNav();updateSyncUI("ok");
        navigate(_found.role==="hr"?"payroll":"dash");
        if(navigator.onLine)pull().then(function(){updateSyncUI("ok");if(currentUser&&currentPage)renderPage(currentPage);});
      }else{localStorage.removeItem("erp_session");}
    }
  }catch(e){}
  // Login
  el("login-btn").addEventListener("click", doLogin);
  el("l-pass").addEventListener("keydown", function(e){if(e.key==="Enter")doLogin();});
  el("l-user").addEventListener("keydown", function(e){if(e.key==="Enter")el("l-pass").focus();});
  // Sidebar
  el("hmb-btn").addEventListener("click", toggleSide);
  el("sclose").addEventListener("click", closeSide);
  el("sov").addEventListener("click", closeSide);
  // Logout
  el("logout-btn").addEventListener("click", doLogout);
  // Sync
  var sb=el("bar-sync-btn");if(sb)sb.addEventListener("click", manualSync);
  // Modal close
  el("modal-close").addEventListener("click", closeModal);
  el("modal").addEventListener("click", function(e){if(e.target===el("modal"))closeModal();});
  // Init
  if(!localStorage.getItem(K.U)) sv(K.U, INIT_USERS);
  updateSyncUI("ok");
  setInterval(updateSyncUI, 5000);
  // Auto-sync every 5 minutes
  setInterval(function(){
    if(isOnline && currentUser) drain();
  }, 5*60*1000);
  // Slideshow
  initSlideshow();
});

// ═══════════════════════════
// SLIDESHOW
// ═══════════════════════════
var slideIdx = 0;
var slideCaptions = [
  "مراكب سياحية • شرم الشيخ",
  "الشعاب المرجانية • البحر الأحمر",
  "رحلات بحرية فاخرة",
  "شروق الشمس على البحر الأحمر",
  "رحلات الغطس والسنوركل"
];
function initSlideshow(){
  var dots=el("ls-dots");if(!dots) return;
  dots.innerHTML="";
  slideCaptions.forEach(function(cap,i){
    var d=document.createElement("button");
    d.className="ls-dot"+(i===0?" act":"");
    d.addEventListener("click",function(){goSlide(i);});
    dots.appendChild(d);
  });
  setInterval(function(){goSlide((slideIdx+1)%slideCaptions.length);}, 5000);
}
function goSlide(n){
  var slides=document.querySelectorAll(".ls-slide");
  var dots=el("ls-dots");var cap=el("ls-cap");
  if(slides[slideIdx]) slides[slideIdx].classList.remove("act");
  if(dots&&dots.children[slideIdx]) dots.children[slideIdx].classList.remove("act");
  slideIdx=n;
  if(slides[slideIdx]) slides[slideIdx].classList.add("act");
  if(dots&&dots.children[slideIdx]) dots.children[slideIdx].classList.add("act");
  if(cap) cap.textContent=slideCaptions[slideIdx];
}
